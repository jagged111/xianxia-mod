 ##Martial Arts Men-at-Arms Descriptions
 martial_artist_cultivator_flavor:0 "Просветлённые, лишь вставшие на путь Бессмертия."
 martial_artist_army_1_flavor:0 "Недавно обученный мастер боевых искусств."
 martial_artist_army_2_flavor:0 "Мастера, постигшие свои боевые пути. Хорошо обученные воины."
 martial_artist_army_3_flavor:0 "Мастер, преодолевший человеческие ограничения. Способен использовать мечную ци."
 zombie_army_1_flavor:0 "Зомби, созданный из мёртвого тела. Не может мыслить или просветляться. Живой щит для передовой."
 zombie_army_2_flavor:0 "Первая попытка воскрешения. Не может мыслить самостоятельно, но способен использовать немного ци."
 zombie_army_3_flavor:0 "Широко известный и принятый способ воскрешения. Цзянши — неотъемлемая часть пути просветления некоторых сект. Способны понимать и использовать просветление. Преданы своему создателю-просветлённому."
 zombie_army_4_flavor:0 "Почти совершенное воскрешение. Сохранили некоторые воспоминания о прошлой жизни и часть своей силы просветления. Могут мыслить и действовать самостоятельно. Имеют слабую связь со своим создателем."
 zombie_army_5_flavor:0 "Повелители Смерти — это воскрешённые, кто просветлял ци смерти и достиг realms Бессмертия."
 immortal_army_1_flavor:0 "Нефритовые Воины достигли realms Бессмертия и носят в себе королевскую кровь. Они — уединённые и благородные истинные бессмертные."
 immortal_army_2_flavor:0 "Они достигли realms Бессмертия чистой силой. Единственное, чего они желают, — это сражения."

