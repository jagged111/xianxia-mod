 # Sect Event Titles
 cultivation_sect_visit.1000.t:0 "Секта Горы Хуа"
 cultivation_sect_visit.1000.desc:0 "Величественные пики Горы Хуа возвышаются предо мной — обитель одной из самых почитаемых ортодоксальных сект. Ученики оттачивают свои формы меча в совершенной гармонии, их движения подобны текучей воде. Ко мне приближается старейшина, оценивая мой потенциал в просветлении."
 cultivation_sect_visit.1000.a:0 "Я желаю вступить в Секту Горы Хуа"
 cultivation_sect_visit.1000.b:0 "Обучите меня технике меча Горы Хуа"
 cultivation_sect_visit.1000.c:0 "Я бросаю вызов вашим ученикам"
 cultivation_sect_visit.1000.d:0 "Я всего лишь гость"

 cultivation_sect_visit.1100.t:0 "Секта Хайнань"
 cultivation_sect_visit.1100.desc:0 "Безмятежные берега Хайнаня простираются предо мной — обитель секты, известной своим мастерством водных техник. Ученики движутся с плавностью океана, их навыки отточены суровыми тренировками. Ко мне приближается старейшина, оценивая мой потенциал."
 cultivation_sect_visit.1100.a:0 "Я желаю вступить в Секту Хайнань"
 cultivation_sect_visit.1100.b:0 "Обучите меня водным техникам Хайнаня"
 cultivation_sect_visit.1100.c:0 "Я бросаю вызов вашим ученикам"
 cultivation_sect_visit.1100.d:0 "Я всего лишь гость"

 cultivation_sect_visit.1200.t:0 "Секта Удан"
 cultivation_sect_visit.1200.desc:0 "Безмятежные пики Удана возвышаются предо мной — обитель секты, известной своим мастерством внутренних боевых искусств. Ученики движутся с плавностью ветра, их навыки отточены суровыми тренировками. Ко мне приближается старейшина, оценивая мой потенциал."
