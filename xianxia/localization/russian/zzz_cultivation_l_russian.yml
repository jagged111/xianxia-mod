 cultivation_sect_visit.1500.t:0 "Храм Шаолинь"
 cultivation_sect_visit.1500.desc:0 "Древний Храм Шаолинь стоит предо мной, его стены хранят эхо веков буддийских песнопений. Монахи оттачивают своё легендарное боевое искусство во дворе, их движения сливают медитацию и бой в единый танец."
 cultivation_sect_visit.1500.a:0 "Я ищу путь ученичества"
