l_english:

artifact_achilles_armor_name: "Armor of Achilles"
artifact_achilles_armor_desc: "Forged from the finest Wootz steel, this armour is outwardly the same as the plate worn by Patroclus when slain by Hector, and by Achilles he slew Hector in return.  Under the bronze gild is solid steel plate and maille, whose equal will never be seen."