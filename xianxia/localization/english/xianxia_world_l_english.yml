 xianxia_world.1800.t:0 "Forge a Magic Treasure"
 xianxia_world.1800.desc:0 "You open the forge hall and align spirit fires with your meridian rhythm. Inscription brushes, soul-tempered ores, and blood-bound catalysts are arranged in concentric arrays.\n\n#bold Craftable Treasure Pool:#!\n• Heaven-Splitter Blade\n• Soul-Binding Gourd\n• Nine Dragon Cauldron\n• Voidstep Boots\n• Starfall Talisman\n• Mirror of True Heart\n• Thunder-Seal Bracelet\n• Emerald Lotus Robe\n• Mount Kunlun Inkstone\n• Ancestral Spirit Banner\n\nYour rank as a treasure crafter will determine refinement quality and forging cadence."
 xianxia_world.1800.a:0 "Begin the refining sequence."
 xianxia_world.1800.b:0 "Delay the forging session."

 forged_magic_treasure_inspiration:0 "Treasure-Forging Inspiration"
 forged_magic_treasure_inspiration_desc:0 "A successful crafting session has sharpened this cultivator's inscription and refinement instincts."

