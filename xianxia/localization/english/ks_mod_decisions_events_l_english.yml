l_english:
 #DECISION_ON_COOLDOWN: "@warning_icon! #X $DECISION_NAME$ unavailable until [DATE.GetStringLong]#!"
 ks_mod_listen_a_story_decision: "Listen to a Story"
 ks_mod_listen_a_story_decision_desc: "Hear a tale from a distant land."
 ks_mod_listen_a_story_decision_tt: "Are the mythical beings in these stories real? You may wish to bring one to your court."
 ks_mod_listen_a_story_decision_tooltip: "Legends around the world speak of wondrous beings. You may want to hear their stories—and perhaps even seek one out to create a story of your own."
 CHOOSE_STORY_BUTTON:0 "This One"
 listen_story_fox_decision: "Listen to a Story about a Fox Spirit"
 listen_story_fox_decision_tooltip: "Listen to a story about a Fox Spirit"
 listen_story_fox_decision_desc: "Listen to a story about a Fox Spirit"
 recruit_fox_cooldown_tt: "You have recently heard this story."
 ks_mod_events.0001.t: "Legend of the Fox Spirit"
 ks_mod_events.0001.desc: "Your Highness, have you heard the legend of the Fox Spirits from the East? It is said that after long years of cultivation, foxes can take human form—most often appearing as beautiful women.\nSome say they are cunning and ever-changing, seducing humans to drain their life essence. Yet folk tales also speak of foxes who repay kindness, taking human form to return a favor, or silently protecting a family from harm.\nThus in texts and tales, Fox Spirits may be demons—or grateful spirits. People both fear and respect them."
 ks_mod_events.0001.a: "Is this true? I want to find one."
 ks_mod_events.0001.a.tt: "Your agents will search for a Fox Spirit."
 ks_mod_events.0001.a2: "Perhaps… I wish to love a Fox Spirit."
 ks_mod_events.0001.a2.tt: "Your agents will search for a Fox Spirit of your preferred gender."
 ks_mod_events.0001.b: "Interesting."
 ks_mod_events.0001.b.tt: "No effect."
 ks_mod_listen_a_story_decision_confirm: "This One"
 convert_to_ks_huxian_culture_decision: "Accept Fox Spirit Identity"
 convert_to_ks_huxian_culture_decision_desc: "You recall an ancient legend passed down through your family: generations ago, your ancestor fell in love with a Fox Spirit and founded House [ROOT.Char.GetHouse.GetNameNoTooltip].\nYou once thought it only a story. But from the strange looks of clergy, the mysterious affection you receive from the opposite sex since puberty, and the faint fox ears you glimpse in mirrors between dream and waking—you have begun to realize the truth of your Fox Spirit blood.\nTonight, the feeling is stronger than ever, whispering from the darkness, urging you to abandon your [ROOT.Char.GetCulture.GetName] heritage and your human identity, and live henceforth as a Fox Spirit."
 convert_to_ks_huxian_culture_decision_tooltip: "You will become of Fox Spirit culture, aiding the spread of your bloodline, though others may view you strangely."
 convert_to_ks_huxian_culture_decision_tt: "You embrace the Fox Spirit identity."
 convert_to_ks_huxian_culture_decision_confirm: "I Will No Longer Be Human"
 ks_can_only_change_culture_once_tt: "You can only change culture once."
 ks_mod_gain_huxian_blood_decision: "Awaken Fox Spirit Bloodline"
 ks_mod_gain_huxian_blood_decision_desc: "The powers of the Fox Spirit dwell within its blood. Most awaken at birth, but a few do so suddenly in adulthood."
 ks_mod_gain_huxian_blood_decision_tooltip: "You will gain the Fox Spirit Bloodline trait, bringing powerful benefits and altering how others see you. Even if you later abandon the Fox Spirit identity, this trait will remain in your bloodline forever."
 ks_mod_gain_huxian_blood_decision_tt: "Your Fox Spirit blood awakens."
 ks_mod_gain_huxian_blood_decision_confirm: "Accept the Blood of the Fox Spirit"
 ks_mod_weaken_effect_of_huxian_blood_decision: "Attempt to Suppress Fox Spirit Blood"
 ks_mod_weaken_effect_of_huxian_blood_decision_desc: "Your blood has caused others to resent you, leaving you distressed. Perhaps a priest may help."
 ks_must_be_human_like_fox_tt: "As a Fox Spirit, priests dislike you. You cannot seek help unless you can disguise yourself as human."
 ks_you_have_tried_once_tt: "You have tried recently."
 ks_mod_weaken_effect_of_huxian_blood_decision_confirm: "I Will Try"
 ks_mod_weaken_effect_of_huxian_blood_decision_tooltip: "You will attempt to weaken the influence of your Fox Spirit blood. This does not affect heredity."
 ks_mod_events.0002.t: "Attempt to Suppress Fox Spirit Blood"
 ks_mod_events.0002.desc: "You arrive at the temple of [realm_priest.GetTitledFirstName].\n“I’ve had enough! I am human! I no longer want to be seen as a monster. I will do anything to diminish the influence of my Fox Spirit blood!”\n[realm_priest.GetFirstNameNoTooltip] grins slyly and offers several options:\n“I can perform a grand ritual to banish the Fox Spirit from your body. It will be expensive.”\n“Or you may buy this… ah, amulet. It works only for a time. You must return each year for renewal, and after ten years, you will need a new one.”"
 ks_mod_events.0002.a: "Perform the ritual."
 ks_mod_events.0002.a.tt: "This is very expensive."
 ks_mod_events.0002.b: "Perhaps the amulet is better."
 ks_mod_events.0002.b.tt: "This costs some money."
 ks_mod_events.0002.c: "Swindler!"
 ks_mod_events.0002.c.tt: "You leave."
 ks_mod_events.0003.t: "Attempt to Suppress Fox Spirit Blood"
 ks_mod_events.0003.desc: "On your way back, an old person calls out to you. The fox ears atop [fox_spirit.GetHerHis] head reveal a Fox Spirit:\n“Child, why reject your Fox Spirit blood? Embrace it. Life as a Fox Spirit is carefree and liberating.”"
 ks_mod_events.0003.a: "Perhaps it is so."
 ks_mod_events.0003.a.tt: "You begin the path of Fox Spirit cultivation."
 ks_mod_events.0003.b: "No! Never!"
 ks_mod_events.0003.b.tt: "You run away—just as you flee from your own heritage."

