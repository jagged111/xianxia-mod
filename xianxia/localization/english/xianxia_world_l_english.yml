 view_jianghu_strongest_leaderboard_decision_confirm:0 "Read the ranking tablets."

 xianxia_world.1891.t:0 "Jianghu Strongest Leaderboard"
 xianxia_world.1891.desc:0 "The latest ranking tablets circulate across inns, mountain sect gates, and city arenas.\n\n#bold Overall Tiers (Gatherings + Tourneys Won):#!\n#emp #1 Under Heaven:#! 20+ wins\n#emp #2 Jianghu Titan:#! 12+ wins\n#emp #3 Renowned Blade:#! 6+ wins\n\n#bold Path Champion Requirement:#! 8+ wins in your own path.\n\n#weak Your current totals:#!\nOverall wins: [ROOT.Var('jianghu_tourney_wins_total').GetValue]\nOrthodox wins: [ROOT.Var('jianghu_tourney_wins_orthodox').GetValue]\nUnorthodox wins: [ROOT.Var('jianghu_tourney_wins_unorthodox').GetValue]\nDemonic wins: [ROOT.Var('jianghu_tourney_wins_demonic').GetValue]\nVagrant wins: [ROOT.Var('jianghu_tourney_wins_vagrant').GetValue]"
 xianxia_world.1891.a:0 "The Jianghu remembers strength."

 jianghu_rank_overall_1:0 "#1 Under Heaven"
 jianghu_rank_overall_1_desc:0 "Currently ranked first on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_overall_2:0 "#2 Jianghu Titan"
 jianghu_rank_overall_2_desc:0 "Currently ranked second on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_overall_3:0 "#3 Renowned Blade"
 jianghu_rank_overall_3_desc:0 "Currently ranked third on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_path_orthodox_1:0 "Orthodox Path Champion"
 jianghu_rank_path_orthodox_1_desc:0 "A leading orthodox winner in jianghu gatherings and tourneys."
 jianghu_rank_path_unorthodox_1:0 "Unorthodox Path Champion"
 jianghu_rank_path_unorthodox_1_desc:0 "A leading unorthodox winner in jianghu gatherings and tourneys."
 jianghu_rank_path_demonic_1:0 "Demonic Path Champion"
 jianghu_rank_path_demonic_1_desc:0 "A leading demonic winner in jianghu gatherings and tourneys."
 jianghu_rank_path_vagrant_1:0 "Vagrant Path Champion"
 jianghu_rank_path_vagrant_1_desc:0 "A leading vagrant winner in jianghu gatherings and tourneys."

 challenge_sect_leader_decision:0 "Challenge Sect Leader"
 challenge_sect_leader_decision_desc:0 "Invoke lineage support and challenge your sect's current leader for the Mandate Seat. Success can force abdication; failure stains your name for decades."
 challenge_sect_leader_decision_tooltip:0 "Starts a sect leadership conflict against your liege. #bold Current Authority (Liege):#! [liege.Var('sect_authority_score').GetValue]"
 challenge_sect_leader_decision_confirm:0 "Issue the challenge tablet."

 purge_dissenting_elders_decision:0 "Purge Dissenting Elders"
 purge_dissenting_elders_decision_desc:0 "Crush elder blocs before they split your sect. This raises fear and short-term obedience at the cost of long-term trust."
 purge_dissenting_elders_decision_tooltip:0 "Triggers an elder-faction confrontation with purge, appeasement, or schism outcomes."
 purge_dissenting_elders_decision_confirm:0 "Cleanse the factional rot."

 consecrate_sacred_mountain_decision:0 "Consecrate Sacred Mountain"
 consecrate_sacred_mountain_decision_desc:0 "Bind your capital mountain's spirit veins under formal sect law and ritual. This anchors territorial authority and stabilizes long-term growth."
 consecrate_sacred_mountain_decision_tooltip:0 "Adds a long-duration county modifier to your capital and improves control/development pressures."
 consecrate_sacred_mountain_decision_confirm:0 "Consecrate the mountain gate."

 xianxia_sect_conflict.0100.t:0 "Elder Factions Demand Concessions"
 xianxia_sect_conflict.0100.desc:0 "Lineage elders accuse your hall of favoritism and weak mandate enforcement. If you fail to resolve this, your sect may split or openly defy your authority.\n\n#bold Current Sect Authority:#! [ROOT.Var('sect_authority_score').GetValue]"
 xianxia_sect_conflict.0100.a:0 "Pay stipends and appease the elders."
 xianxia_sect_conflict.0100.b:0 "Purge the loudest dissenters."
 xianxia_sect_conflict.0100.c:0 "Let a schism bleed off pressure."

 xianxia_sect_conflict.0110.t:0 "Sect Schism at the Mountain Gate"
 xianxia_sect_conflict.0110.desc:0 "A faction of elders and disciples has broken discipline and declared a separate hall. The split weakens your direct control and fractures cultivation legitimacy."
 xianxia_sect_conflict.0110.a:0 "Accept the split and preserve the core sect."
 xianxia_sect_conflict.0110.b:0 "Crush the breakaway hall by force."

 xianxia_sect_conflict.0200.t:0 "Challenge the Mandate Seat"
 xianxia_sect_conflict.0200.desc:0 "You can challenge [scope:sect_leader_target.GetTitledFirstName] for sect leadership. Elders and lineage blocs will back strength, cunning, and political momentum."
 xianxia_sect_conflict.0200.a:0 "Challenge openly before the elders."
 xianxia_sect_conflict.0200.b:0 "Not yet. My moment will come."

 xianxia_sect_conflict.0210.t:0 "Sect Leadership Duel"
 xianxia_sect_conflict.0210.desc:0 "Challenge banners rise. One side will leave with the Mandate Seat; the other will carry decades of shame or vengeance."
 xianxia_sect_conflict.0210.a:0 "Let heaven judge this contest."

 xianxia_sect_conflict.0220.t:0 "You Seize the Mandate Seat"
 xianxia_sect_conflict.0220.desc:0 "Your challenge succeeds. The old leader is forced into a diminished elder role while your authority reshapes court loyalties and succession expectations."
 xianxia_sect_conflict.0220.a:0 "From now on, this sect follows my law."

 xianxia_sect_conflict.0230.t:0 "Your Challenge Is Crushed"
 xianxia_sect_conflict.0230.desc:0 "Your claim fails. Rival elders brand you a cautionary tale, and your prestige collapses across jianghu circles."
 xianxia_sect_conflict.0230.a:0 "I endure this humiliation... for now."

 sect_authority_high:0 "High Sect Authority"
 sect_authority_high_desc:0 "This leader maintains broad sect legitimacy and can keep lineages aligned under one mandate."
 sect_authority_low:0 "Low Sect Authority"
 sect_authority_low_desc:0 "This leader's mandate is disputed by elders and lineage blocs, increasing internal fragmentation."
 sect_elder_faction_pressure:0 "Elder Faction Pressure"
 sect_elder_faction_pressure_desc:0 "Competing elder blocs are pressing competing heirs, privileges, and policy demands."
 sect_schism_recent:0 "Recent Sect Schism"
 sect_schism_recent_desc:0 "A breakaway hall split from this sect, damaging cohesion and realm stability."
 sect_purge_aftermath:0 "Purge Aftermath"
 sect_purge_aftermath_desc:0 "Dissent was crushed violently, increasing fear but poisoning internal trust."
 sect_lineage_backed_heir:0 "Lineage-Backed Heir"
 sect_lineage_backed_heir_desc:0 "A strong lineage bloc currently supports this cultivator for future leadership conflict."
 sect_challenger_glory:0 "Sect Challenger's Glory"
 sect_challenger_glory_desc:0 "This cultivator won a leadership challenge and now carries overwhelming sect momentum."
 sect_challenger_disgraced:0 "Disgraced Challenger"
 sect_challenger_disgraced_desc:0 "A failed leadership challenge shattered this cultivator's prestige and political capital."
 sect_forced_abdication_shame:0 "Forced Abdication Shame"
 sect_forced_abdication_shame_desc:0 "This former sect leader was publicly displaced in a mandate challenge."
 sect_exiled_elder:0 "Exiled Elder"
 sect_exiled_elder_desc:0 "This elder was driven out during internal sect purges and faction cleansing."

 sacred_mountain_consecrated:0 "Consecrated Sacred Mountain"
 sacred_mountain_consecrated_desc:0 "Sect rituals stabilized this mountain's spirit veins, improving local order and cultivation throughput."
 spirit_vein_secured:0 "Secured Spirit Vein"
 spirit_vein_secured_desc:0 "Stable sect governance has secured local spirit-vein discipline and military readiness."
 spirit_vein_contested:0 "Contested Spirit Vein"
 spirit_vein_contested_desc:0 "Rival sect pressure and internal instability are disrupting spirit-vein control."
 corrupted_spirit_vein:0 "Corrupted Spirit Vein"
 corrupted_spirit_vein_desc:0 "The local spiritual flow is unstable and tainted, feeding intrigue and disorder."

 establish_sect_branch_hall_decision:0 "Establish Sect Branch Hall"
 establish_sect_branch_hall_decision_desc:0 "Found a branch hall in one of your domain counties to anchor local sect influence and long-term spirit-vein discipline."
 establish_sect_branch_hall_decision_tooltip:0 "Selects a valid domain county and grants secured spirit-vein benefits, development growth, and control support."
 establish_sect_branch_hall_decision_confirm:0 "Raise a branch hall."

 corrupt_spirit_vein_decision:0 "Corrupt Spirit Vein"
 corrupt_spirit_vein_decision_desc:0 "Twist your capital's spiritual flow through forbidden methods. This boosts coercive politics but destabilizes county order."
 corrupt_spirit_vein_decision_tooltip:0 "Demonic/unorthodox rulers can convert stable spirit-vein control into a corruption model."
 corrupt_spirit_vein_decision_confirm:0 "Let corruption spread."

 enforce_high_realm_submission_decision:0 "Enforce High-Realm Submission"
 enforce_high_realm_submission_decision_desc:0 "Demonstrate overwhelming realm pressure so weaker rulers and courtiers bend to your cultivation hierarchy."
 enforce_high_realm_submission_decision_tooltip:0 "Applies long-duration submission/deference effects to vassals and cultivator courtiers."
 enforce_high_realm_submission_decision_confirm:0 "Kneel before higher heaven."

 xianxia_sect_conflict.0300.t:0 "Spirit Vein Contest in the Capital"
 xianxia_sect_conflict.0300.desc:0 "Rival sect agents and internal dissidents are contesting your capital's spiritual arteries. If left unchecked, your county control and sect authority will erode."
 xianxia_sect_conflict.0300.a:0 "Deploy elders and suppress the contest."
 xianxia_sect_conflict.0300.b:0 "Withdraw and consolidate elsewhere."

 high_realm_mandate_presence:0 "High-Realm Mandate Presence"
 high_realm_mandate_presence_desc:0 "The ruler's overwhelming cultivation realm imposes political gravity on the entire court and vassal structure."
 high_realm_suppressed_vassal:0 "Suppressed by High-Realm Presence"
 high_realm_suppressed_vassal_desc:0 "This ruler operates under the shadow of a far stronger cultivator authority."
 high_realm_court_deference:0 "Court Deference to Higher Realm"
 high_realm_court_deference_desc:0 "This cultivator suppresses independent expression around a high-realm sovereign."
 opinion_high_realm_submission:0 "Forced High-Realm Submission"
