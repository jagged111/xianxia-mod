 xianxia_world.1110.t:0 "Tournament Second Round"
 xianxia_world.1110.desc:0 "The first round settles old grudges, but the second draws blood and fame. Injuries spread, new rivals emerge, and your banner rises over the arena."
 xianxia_world.1110.a:0 "Advance to the decisive rounds."
 xianxia_world.1120.t:0 "Tournament Finals"
 xianxia_world.1120.desc:0 "In the final exchange, your side claims victory and secures sect prestige, resources, and new oaths."
 xianxia_world.1120.a:0 "Claim the Jianghu laurels."

 xianxia_world.1510.t:0 "Secret Realm - Midway Trial"
 xianxia_world.1510.desc:0 "Your expedition pushes deeper through arrays and spirit beasts. Progress comes steadily, but each step risks collapse."
 xianxia_world.1510.a:0 "Continue deeper."
 xianxia_world.1520.t:0 "Secret Realm - Final Inheritance"
 xianxia_world.1520.desc:0 "At the heart of the realm, inheritance altars flicker. Wealth, scriptures, or deviation await based on your path."
 xianxia_world.1520.a:0 "Take the final reward."

 xianxia_world.1310.t:0 "Alchemy Furnace Preparation"
 xianxia_world.1310.desc:0 "Herbs, ore, spirit cores, and furnace arrays are set in graded order. Furnace quality and your control will decide this batch's rank."
 xianxia_world.1310.a:0 "Begin the layered refinement."
 xianxia_world.1320.t:0 "Alchemy Result"
 xianxia_world.1320.desc:0 "The furnace opens. Either an excellent medicine emerges, or deviation scars body and meridians."
 xianxia_world.1320.a:0 "Accept the result."

