 declare_heavenly_demon_decision_tooltip:0 "Requires the Heavenly Demon Sect and empire-scale conquest. Grants a permanent same-faith opinion surge and major cultivation learning momentum."
 declare_heavenly_demon_decision_confirm:0 "Let all under heaven witness the Heavenly Demon."

