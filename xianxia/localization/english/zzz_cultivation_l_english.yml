 trait_dragon_bloodline_desc:0 "An ancient sovereign bloodline tied to draconic will. Dragon blood strengthens body, authority, and battlefield presence."
 trait_dragon_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Dragon Blood, bearing a tyrannical aura that bends weaker wills."
 trait_phoenix_bloodline_desc:0 "A noble flame bloodline associated with rebirth and purification. Phoenix blood grants resilience and recovery after hardship."
 trait_phoenix_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Phoenix Blood, enduring calamity with unyielding life force."
 trait_anchestor_bloodline_desc:0 "A lineage blessed by ancestral echoes. This bloodline preserves inherited techniques and stabilizes generational cultivation."
 trait_anchestor_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Ancestor Blood, with spiritual roots deeply tied to clan legacy."
 trait_poison_bloodline_desc:0 "A dangerous bloodline infused with venomous essence. Poison blood turns qi into corrosion, toxins, and insidious killing arts."
 trait_poison_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Poison Blood, and even their qi can erode enemies from within."
 trait_cursed_bloodline_desc:0 "A burdened lineage marked by fate. Cursed blood grants forbidden power at the cost of ominous karmic consequences."
 trait_cursed_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Cursed Blood, walking a path of strength shadowed by misfortune."
 trait_demon_bloodline_desc:0 "A savage bloodline attuned to slaughter and devouring intent. Demon blood favors ruthless growth and fearsome pressure."
 trait_demon_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Demon Blood, with a sinister aura that unsettles even veteran cultivators."
 trait_primal_bloodline_desc:0 "A primordial lineage close to the origin of heaven and earth. Primal blood offers raw compatibility with fundamental dao laws."
 trait_primal_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Primal Blood, resonating with ancient and untamed world qi."
 trait_spirit_bloodline_desc:0 "A lucid bloodline favored by spirits. Spirit blood sharpens perception, affinity, and control over refined qi techniques."
 trait_spirit_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Spirit Blood, naturally attuned to subtle fluctuations of heaven and earth."
 trait_sun_bloodline_desc:0 "A radiant bloodline born from pure solar essence. Sun blood empowers flame arts, purification, and tyrannical daytime cultivation."
 trait_sun_bloodline_character_desc:0 "[ROOT.Char.GetFirstName] carries Sun Blood, blazing with intense yang radiance."

