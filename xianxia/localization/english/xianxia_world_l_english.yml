 sect_coup_victor:0 "Coup Victor"
 sect_coup_victor_desc:0 "This cultivator rose through coup politics during a succession crisis."
 sect_emergency_regent:0 "Emergency Sect Regent"
 sect_emergency_regent_desc:0 "A provisional regent installed to prevent total collapse after succession breakdown."

