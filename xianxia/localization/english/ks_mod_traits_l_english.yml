 #DECISION_ON_COOLDOWN: "@warning_icon! #X $DECISION_NAME$ unavailable until [DATE.GetStringLong]#!"
 trait_huxian_female: "Fox Spirit Bloodline"
 trait_huxian: "Fox Spirit Bloodline"
 trait_huxian_desc: "This character carries the blood of a fox spirit, inheriting the cunning of foxes and an attraction to the opposite sex. However, clergy and zealous followers may view them as an embodiment of demons or spirits. There is a chance for this trait to be inherited, and characters from the fox spirit culture may awaken this bloodline at a certain age."
 trait_huxian_cultivation: "Fox Spirit Cultivation"
 trait_huxian_cultivation_desc: "This character has just begun the path of fox spirit cultivation."
 trait_huxian_cultivation_1: "Fox Spirit Cultivation - Two Tails"
 trait_huxian_cultivation_1_desc: "Through cultivation, this fox spirit has refined the art of spiritual charm."
 trait_huxian_cultivation_2: "Fox Spirit Cultivation - Three Tails"
 trait_huxian_cultivation_2_desc: "Through cultivation, this fox spirit has improved strategy and mystical arts."
 trait_huxian_cultivation_3: "Fox Spirit Cultivation - Five Tails"
 trait_huxian_cultivation_3_desc: "This fox spirit’s cultivation is taking form, granting insight into ancient knowledge and the essence of life."
 trait_huxian_cultivation_4: "Fox Spirit Cultivation - Seven Tails"
 trait_huxian_cultivation_4_desc: "This fox spirit has become widely renowned as a great fox spirit."
 trait_huxian_cultivation_5: "Fox Spirit Cultivation - Eight Tails"
 trait_huxian_cultivation_5_desc: "This fox spirit has reached the peak of cultivation, standing one step away from becoming the greatest of all fox spirits."
