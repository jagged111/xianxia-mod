  cultivation_regular_event.102.t:0 "Pocket dimension"
  cultivation_regular_event.102.desc:0 "While wandering your domain, you spot what looks like the entrance to a pocket dimension with a time dilation. While it should be stable for the next hour, anything beyond that is uncertain, and you know you would not survive an unstable pocket dimension. However, you could use it to cultivate faster..."
  cultivation_regular_event.102.a:0 "Cultivate for only 1 hour."
  cultivation_regular_event.102.b:0 "Risk it and cutltivate for 3 hours."
  cultivation_regular_event.102.c:0 "No pain no gain, go for 5 hours."
  cultivation_regular_event.102.d:0 "Ignore it."