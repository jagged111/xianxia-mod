l_english:
 claim_heavenly_mandate_vassal_title:0 "Claim the Heavenly Mandate"
 claim_heavenly_mandate_vassal_desc:0 "Your cultivation has reached a height where mortal hierarchy no longer binds you. Claim Heaven's Mandate and force destiny to acknowledge your right to rule."
 claim_heavenly_mandate_vassal_confirm:0 "Heaven bears witness."
 claim_heavenly_mandate_vassal_tooltip:0 "Gain the [GetTrait('conqueror').GetName(GetNullCharacter)] trait and a pressed claim on your liege's primary title."

 claim_heavenly_mandate_independent_title:0 "Proclaim a Heavenly Mandate"
 claim_heavenly_mandate_independent_desc:0 "As an independent cultivator-lord, your will is your own law. Proclaim your mandate and let all realms know your destiny is conquest."
 claim_heavenly_mandate_independent_confirm:0 "My mandate is absolute."
 claim_heavenly_mandate_independent_tooltip:0 "Gain the [GetTrait('conqueror').GetName(GetNullCharacter)] trait."

 claim_superior_realm_liege_title:0 "Assert Superior Realm Authority"
 claim_superior_realm_liege_desc:0 "Your liege stands below your realm of attainment. By heavenly law, power outranks title; claim what should be yours."
 claim_superior_realm_liege_confirm:0 "The weak cannot command the strong."
 claim_superior_realm_liege_tooltip:0 "Gain a pressed claim on your liege's primary title."

awaken_meridian_disciples_decision:0 "Awaken Meridian Disciples"
awaken_meridian_disciples_decision_desc:0 "Gather those with awakened meridian potential and guide them into Qi Gathering, strengthening your court and domain with new disciples."
awaken_meridian_disciples_decision_confirm:0 "Open their meridians."
awaken_meridian_disciples_tooltip:0 "Eligible courtiers and vassals with meridian traits begin at Qi Gathering."

cleanse_remnant_sects_decision:0 "Cleanse Remnant Sects"
cleanse_remnant_sects_decision_desc:0 "Purge lingering sect influence from your directly held lands and align your domain with your current cultivation faith. Vassal lands remain unchanged, but offended vassals of your former sect will resent this purge."
cleanse_remnant_sects_decision_confirm:0 "Purge the remnant sects."
cleanse_remnant_sects_decision_tooltip:0 "Convert only your directly held counties to your faith and anger vassals who still follow your former sect."

remnant_sect_purged_opinion:0 "Purged My Sect's Influence"
despises_weak_liege_cultivation_opinion:0 "Realm Above Their Liege"
cultivation_views_me_as_future_threat_opinion:0 "Views Me as a Future Threat"
cultivation_invests_in_my_talent_opinion:0 "Invested in My Talent"
orthodox_realm_insight:0 "Orthodox Realm Insight"
orthodox_realm_insight_desc:0 "Disciplined scripture study refines this cultivator's Dao heart and stabilizes their realm."
unorthodox_realm_insight:0 "Unorthodox Realm Insight"
unorthodox_realm_insight_desc:0 "A blade-edge path of rivalry and breakthrough hones this cultivator's battle instincts."
demonic_realm_insight:0 "Demonic Realm Insight"
demonic_realm_insight_desc:0 "Cruel methods and forbidden arts convert each breakthrough into fearsome killing intent."
vagrant_realm_insight:0 "Vagrant Realm Insight"
vagrant_realm_insight_desc:0 "Rivers-and-lakes wandering broadens this cultivator's perspective and adaptive techniques."
divine_beast_spirit_companion:0 "Spirit Beast Companion"
divine_beast_spirit_companion_desc:0 "A bonded spirit beast fights at this cultivator's side, sharpening their body and battle reflexes."
wudang_taiji_harmony:0 "Taiji Harmony"
wudang_taiji_harmony_desc:0 "Wudang balance turns force aside and steadies the Dao heart."
jade_chamber_alluring_presence:0 "Alluring Presence"
jade_chamber_alluring_presence_desc:0 "Jade Chamber arts blend charm and cultivation, drawing allies and admirers alike."
blood_moon_killing_intent:0 "Blood Moon Killing Intent"
blood_moon_killing_intent_desc:0 "Demonic moonlight tempers this cultivator into a terrifying predator."
ancient_relic_treasure_resonance:0 "Treasure Resonance"
ancient_relic_treasure_resonance_desc:0 "Ancient relic qi resonates through this cultivator's body, boosting command of wealth and lore."

jianghu_oath_gathering_decision:0 "Convene a Jianghu Oath Gathering"
jianghu_oath_gathering_decision_desc:0 "Invite wandering swordsmen, sect envoys, alchemists, and rogue cultivators to your court. Over cups of wine and veiled boasts, oaths are sworn, rivalries measured, and your name carried across the rivers and lakes."
jianghu_oath_gathering_decision_confirm:0 "Let the Jianghu witness me."
jianghu_oath_gathering_decision_tooltip:0 "Attempt to host a true [GetActivityType('activity_tournament').GetName] as a Jianghu martial gathering, gaining sect resources and renown on success. Places this on cooldown for 5 years."

purge_mortal_afflictions_decision:0 "Purge Mortal Afflictions"
purge_mortal_afflictions_decision_desc:0 "By circulating your refined qi through every meridian and organ, you expel mortal diseases, stabilize your body, and mend lingering injuries that would cripple ordinary people."
purge_mortal_afflictions_decision_confirm:0 "Circulate qi through every channel."
purge_mortal_afflictions_decision_tooltip:0 "Requires at least one major disease or injury. Cleanse afflictions, gain stress relief, and enter a 1-month cooldown."
mentor_guidance_opinion:0 "Mentor Guidance"
lineage_betrayal_opinion:0 "Lineage Betrayal"
