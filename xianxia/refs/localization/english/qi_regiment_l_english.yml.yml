l_english:

thousand_qi_needles:0 "Thousand Qi Needles"
thousand_qi_needles_flavor:0 "#F With a flick of the sleeve, a thousand condensed qi needles scream forth from the cultivator, turning the sky into a deadly storm of invisible piercing light that shreds formations and armies alike. This is the signature manifestation of one who has stepped into the Qi Gathering realm.#!"

nine_heavens_sword_intent:0 "Nine Heavens Sword Intent"
nine_heavens_sword_intent_flavor:0 "#F A single strand of peerless sword intent—pure condensed qi forged across the nine firmaments—rips open the void. Mountains are bisected, rivers flow upward, and all creation trembles before this absolute qi domain born from a Foundation Establishment cultivator’s enlightenment.#!"

golden_core_flame_lotus:0 "Golden Core Flame Lotus"
golden_core_flame_lotus_flavor:0 "#F The golden core spins furiously within the dantian, birthing an immortal nine-petaled flame lotus that floats above the battlefield. Everything it touches—steel, stone, or flesh—is reduced to drifting ash by inextinguishable golden fire.#!"

nascent_soul_phantom:0 "Nascent Soul Phantom"
nascent_soul_phantom_flavor:0 "#F The nascent soul detaches and manifests as a colossal immortal phantom towering a thousand zhang. One palm covers the sky, one step crosses a thousand li; heaven and earth bow before the sovereign might of the Nascent Soul realm.#!"

heaven_severing_blade:0 "Heaven-Severing Blade"
heaven_severing_blade_flavor:0 "#F A single horizontal slash of pure qi in the shape of a heaven-severing blade severs the connection between heaven and earth. The firmament splits, immortals fall headless, and even the laws of the Dao themselves are rent asunder by the unparalleled will of a Spirit Severing cultivator.#!"

myriad_dao_suppression_domain:0 "Myriad Dao Suppression Domain"
myriad_dao_suppression_domain_flavor:0 "#F Ten thousand Daos are forcibly suppressed within this absolute domain. All techniques fail, all spiritual energy scatters, and every enemy is reduced to a powerless mortal beneath the overwhelming pressure of one who seeks the true Dao.#!"

heavenly_tribulation_descent:0 "Heavenly Tribulation Descent"
heavenly_tribulation_descent_flavor:0 "#F The wrathful tribulation lightning that once tested the ascendant now obeys their command. Endless bolts of purple-black annihilation rain from cracked heavens, punishing all who dare oppose one who has achieved Immortal Ascension.#!"