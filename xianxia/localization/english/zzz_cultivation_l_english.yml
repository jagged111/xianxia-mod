 #######################
 ## BREAKTHROUGH EVENTS - MAIN CHOICES
 #######################

 # Qi Gathering (1000-1002)
 cultivation_breakthrough.1000.t:0 "Qi Gathering Breakthrough"
 cultivation_breakthrough.1000.desc:0 "You sit in meditation, gathering the spiritual energy around you. This is the moment of truth - will you breakthrough to Qi Gathering realm?"
 cultivation_breakthrough.1000.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1000.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1000.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_qi_gathering').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1000.f_tt:0 "#low Failure:#! +15 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1001.t:0 "Breakthrough Success!"
 cultivation_breakthrough.1001.desc:0 "A surge of spiritual energy floods your body! Your mortal shell shatters as you step into the [GetTrait('cultivation_qi_gathering').GetName(GetNullCharacter)] realm. The world seems brighter, your senses sharper - you have taken your first step on the path to immortality!"
 cultivation_breakthrough.1001.a:0 "I have broken through!"

 cultivation_breakthrough.1002.t:0 "Breakthrough Failed"
 cultivation_breakthrough.1002.desc:0 "The Qi slips through your grasp like water through your fingers. Your foundation trembles, but holds. You have failed this time, but you can try again once you recover."
 cultivation_breakthrough.1002.a:0 "I need more preparation..."

 # Qi Refining (1100-1102)
 cultivation_breakthrough.1100.t:0 "Qi Refining Breakthrough"
 cultivation_breakthrough.1100.desc:0 "Your gathered Qi swirls within you, ready to be refined into something purer. The next realm awaits - but the difficulty increases."
 cultivation_breakthrough.1100.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1100.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1100.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_qi_refining').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1100.f_tt:0 "#low Failure:#! +20 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1101.t:0 "Qi Refining Success!"
 cultivation_breakthrough.1101.desc:0 "Your Qi transforms, becoming purer and more potent! You have entered the [GetTrait('cultivation_qi_refining').GetName(GetNullCharacter)] realm. Each breath now draws in refined spiritual energy."
 cultivation_breakthrough.1101.a:0 "My Qi is refined!"

 cultivation_breakthrough.1102.t:0 "Qi Refining Failed"
 cultivation_breakthrough.1102.desc:0 "The refinement process goes awry. Your Qi remains unchanged, but you sense what went wrong. Next time will be different."
 cultivation_breakthrough.1102.a:0 "I will try again..."

 # Qi Building (1200-1202)
 cultivation_breakthrough.1200.t:0 "Qi Building Breakthrough"
 cultivation_breakthrough.1200.desc:0 "Your refined Qi needs structure. You must construct a stable foundation for Core Formation - a critical step in cultivation."
 cultivation_breakthrough.1200.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1200.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1200.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_qi_building').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1200.f_tt:0 "#low Failure:#! +25 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1201.t:0 "Qi Building Success!"
 cultivation_breakthrough.1201.desc:0 "Your Qi foundation solidifies! Brick by brick, layer by layer, you have constructed a stable base for your future golden core. The [GetTrait('cultivation_qi_building').GetName(GetNullCharacter)] realm is yours!"
 cultivation_breakthrough.1201.a:0 "My foundation is solid!"

 cultivation_breakthrough.1202.t:0 "Qi Building Failed"
 cultivation_breakthrough.1202.desc:0 "Cracks appear in your Qi structure. The foundation refuses to stabilize. You must study more before attempting again."
 cultivation_breakthrough.1202.a:0 "Back to studying..."

 # Core Formation (1300-1302)
 cultivation_breakthrough.1300.t:0 "Core Formation Breakthrough"
 cultivation_breakthrough.1300.desc:0 "The moment has come to condense your Qi into a golden core. This is the true beginning of immortality! Success means transcending mortality itself."
 cultivation_breakthrough.1300.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1300.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1300.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_core_formation').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1300.f_tt:0 "#low Failure:#! +30 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1301.t:0 "Core Formation Success!"
 cultivation_breakthrough.1301.desc:0 "A brilliant golden light erupts from your dantian! Your Qi condenses into a perfect golden core, radiating power. You are no longer truly mortal - the path to immortality lies open before you!"
 cultivation_breakthrough.1301.a:0 "The Golden Core is formed!"

 cultivation_breakthrough.1302.t:0 "Core Formation Failed"
 cultivation_breakthrough.1302.desc:0 "The Qi refuses to condense. Your core remains unformed. This is a difficult barrier - many cultivators are stuck here for decades. But you will try again."
 cultivation_breakthrough.1302.a:0 "The bottleneck remains..."

 # Nascent Soul (1400-1402)
 cultivation_breakthrough.1400.t:0 "Nascent Soul Breakthrough"
 cultivation_breakthrough.1400.desc:0 "Your golden core begins to crack... not from failure, but transformation! A nascent soul will emerge from within!"
 cultivation_breakthrough.1400.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1400.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1400.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_nascent_soul').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1400.f_tt:0 "#low Failure:#! +35 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1401.t:0 "Nascent Soul Success!"
 cultivation_breakthrough.1401.desc:0 "Your golden core shatters, and from within emerges a miniature version of yourself - your Nascent Soul! Even if your body dies, your soul can survive. True immortality is within reach!"
 cultivation_breakthrough.1401.a:0 "My soul is born!"

 cultivation_breakthrough.1402.t:0 "Nascent Soul Failed"
 cultivation_breakthrough.1402.desc:0 "The transformation fails. Your core remains intact but unchanging. The nascent soul refuses to emerge."
 cultivation_breakthrough.1402.a:0 "Not yet..."

 # Heavenly Being (1500-1502)
 cultivation_breakthrough.1500.t:0 "Heavenly Being Breakthrough"
 cultivation_breakthrough.1500.desc:0 "Ascend beyond mortality and become a heavenly existence! Your nascent soul yearns to transform."
 cultivation_breakthrough.1500.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1500.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1500.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_heavenly_beingg').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1500.f_tt:0 "#low Failure:#! +40 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1501.t:0 "Heavenly Being Success!"
 cultivation_breakthrough.1501.desc:0 "Your nascent soul ascends! You are no longer bound by mortal laws. The heavens themselves recognize your existence!"
 cultivation_breakthrough.1501.a:0 "I ascend!"

 cultivation_breakthrough.1502.t:0 "Heavenly Being Failed"
 cultivation_breakthrough.1502.desc:0 "The heavens reject you. The barrier holds firm."
 cultivation_breakthrough.1502.a:0 "The heavens bar my path..."

 # Four-Axis (1600-1602)
 cultivation_breakthrough.1600.t:0 "Four-Axis Breakthrough"
 cultivation_breakthrough.1600.desc:0 "Master the four fundamental forces and transcend the heavens themselves!"
 cultivation_breakthrough.1600.attempt:0 "Attempt Breakthrough Now"
 cultivation_breakthrough.1600.wait:0 "Wait for Better Opportunity"
 cultivation_breakthrough.1600.s_tt:0 "#high Success:#! Ascend to [GetTrait('cultivation_four_axis').GetName(GetNullCharacter)] realm!"
 cultivation_breakthrough.1600.f_tt:0 "#low Failure:#! +45 [stress|E], gain [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip] for 3 months"

 cultivation_breakthrough.1601.t:0 "Four-Axis Success!"
 cultivation_breakthrough.1601.desc:0 "The four axes align! Space, time, matter, energy - all bow to your will!"
 cultivation_breakthrough.1601.a:0 "The forces are mine!"

 cultivation_breakthrough.1602.t:0 "Four-Axis Failed"
 cultivation_breakthrough.1602.desc:0 "The forces remain beyond your grasp."
 cultivation_breakthrough.1602.a:0 "Not strong enough..."

 # Integration (1700-1702)
 cultivation_breakthrough.1700.t:0 "Integration Breakthrough"
