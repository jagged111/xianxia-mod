 alchemy_tribulation_guard_pill:0 "Tribulation Guard Pill"
 alchemy_tribulation_guard_pill_desc:0 "A rare defensive pill that cushions the body against tribulation backlash and hostile interference."
 alchemy_blood_ignition_pill:0 "Blood Ignition Pill"
 alchemy_blood_ignition_pill_desc:0 "A violent enhancer that surges battle output while increasing internal strain."

 auction_mortal_tier_find:0 "Auction Gain: Mortal Tier"
 auction_mortal_tier_find_desc:0 "A decent low-tier lot was secured at fair value."
 auction_profound_tier_find:0 "Auction Gain: Profound Tier"
 auction_profound_tier_find_desc:0 "A strong profound-grade lot improved this cultivator's standing and resources."
 auction_heaven_tier_find:0 "Auction Gain: Heaven Tier"
 auction_heaven_tier_find_desc:0 "A heaven-tier acquisition elevates this cultivator's prestige among major sect circles."
 auction_rival_resentment:0 "Auction Rival Resentment"
 auction_rival_resentment_desc:0 "Aggressive bidding has offended rivals who now harbor lasting resentment."
 auction_renowned_seller:0 "Renowned Auction Seller"
 auction_renowned_seller_desc:0 "Successful sale of personal treasures boosted this cultivator's reputation as a high-value broker."
 legendary_breakthrough_pill_ready:0 "Legendary Breakthrough Pill"
 legendary_breakthrough_pill_ready_desc:0 "A heaven-defying breakthrough pill discovered among rare relics. The next breakthrough attempt is guaranteed to succeed."
 legendary_breakthrough_pill_found_tt:0 "You discovered a [GetModifier('legendary_breakthrough_pill_ready').GetNameWithTooltip] hidden among legendary artifacts."
 study_magic_treasure_crafting_decision:0 "Study Magic Treasure Crafting"
 study_magic_treasure_crafting_decision_desc:0 "Hire inscription masters, collect forge manuals, and practice spirit-smithing arrays to advance your magic treasure craft rank."
 study_magic_treasure_crafting_decision_tooltip:0 "Provides a progression path for Magic Treasure Crafter traits (Tier 1 -> Tier 2 -> Tier 3)."
 study_magic_treasure_crafting_decision_confirm:0 "Begin focused forge study."

 xianxia_world.1840.t:0 "Forge Hall Instruction"
 xianxia_world.1840.desc:0 "You spend months under veteran artifact refiners, learning material resonance, inscription layering, and spirit-binding stabilization."
 xianxia_world.1840.a:0 "My treasure-crafting dao deepens."
 invite_path_cultivators_decision:0 "Invite Path Cultivators"
 invite_path_cultivators_decision_desc:0 "Send invitations through inns, mountain passes, and sect channels to recruit wandering cultivators of your cultivation path as court champions."
 invite_path_cultivators_decision_tooltip:0 "Invites existing wandering cultivators of your doctrine path first; generates one only if none are available."
 invite_path_cultivators_decision_confirm:0 "Send recruitment talismans."

 xianxia_world.1850.t:0 "Path Cultivator Recruitment"
 xianxia_world.1850.desc:0 "Your invitation tablets circulate through jianghu networks. Path-aligned wanderers may answer your call to become elite court guardians and frontline champions."
 xianxia_world.1850.a:0 "Recruit them as my path champions."
 xianxia_world.1850.b:0 "Not now."

 invited_path_guardian:0 "Invited Path Guardian"
 invited_path_guardian_desc:0 "This cultivator answered a path-aligned summons and now serves as an elite court champion."
 sect_examination_activity_decision:0 "Host Sect Examination"
 sect_examination_activity_decision_desc:0 "Convene a formal sect examination using tiered acceptance scores from meridians, bloodline rank, body foundation, and realm. High-threshold candidates start in the inner court; weaker candidates enter the outer court."
 sect_examination_activity_decision_tooltip:0 "Talented meridians and higher bloodline/body/realm tiers gain acceptance bonuses; only threshold passers start as inner-court disciples."
 sect_examination_activity_decision_confirm:0 "Open the examination grounds."
 inner_court_promotion_activity_decision:0 "Hold Inner Court Promotion"
 inner_court_promotion_activity_decision_desc:0 "After years of observation, elevate proven sect disciples into the inner court where they receive protected manuals and denser qi resources."
 inner_court_promotion_activity_decision_tooltip:0 "Launches a long-cooldown promotion activity that advances top disciples to inner court status."
 inner_court_promotion_activity_decision_confirm:0 "Convene the inner court review."
 elder_promotion_activity_decision:0 "Hold Elder Promotion Assembly"
 elder_promotion_activity_decision_desc:0 "Summon lineage heads and hall masters to elevate inner disciples who have reached the typical elder realm threshold."
 elder_promotion_activity_decision_tooltip:0 "Only candidates at Core Formation realm or higher are eligible for elder appointment."
 elder_promotion_activity_decision_confirm:0 "Begin elder nominations."


 xianxia_world.1860.t:0 "Sect Disciple Assignment"
 xianxia_world.1860.desc:0 "Elders present lists of talented non-adult disciples. You can formalize mentor assignments so future prodigies are raised under established cultivators."
 xianxia_world.1860.a:0 "Assign talented disciples to cultivator mentors."
 xianxia_world.1860.b:0 "Postpone the assignment cycle."

 xianxia_world.1870.t:0 "Jianghu Grand Gathering Opens"
 xianxia_world.1870.desc:0 "Sect banners rise as cultivators, wandering swords, and hidden elders arrive. The gathering now evaluates hosts by demonstrated martial prowess and sect coordination instead of random fortune."
 xianxia_world.1870.a:0 "Open the first stage."
 xianxia_world.1870.b:0 "Cancel the gathering."

 xianxia_world.1871.t:0 "Jianghu Gathering - Rivalry Stage"
 xianxia_world.1871.desc:0 "As rounds progress, your command presence and martial display determine whether the sect leaves with strengthened mandate or internal embarrassment."
 xianxia_world.1871.a:0 "Push through the rivalry stage."

 xianxia_world.1872.t:0 "Jianghu Gathering - Final Stage"
 xianxia_world.1872.desc:0 "The final exchanges settle reputation and sect standing. Your hosting prestige is decided in this closing phase."
 xianxia_world.1872.a:0 "Conclude the grand gathering."

 jianghu_activity_host_momentum:0 "Jianghu Activity Momentum"
 jianghu_activity_host_momentum_desc:0 "Successful staged hosting of a jianghu gathering increases prestige and social momentum among path-aligned sect circles."
 xianxia_world.1880.t:0 "Same-Path Dao Exchange Banquet"
 xianxia_world.1880.desc:0 "Pavilions are prepared like a grand feast, but this gathering is for same-path cultivators to debate scripture meaning, breakthrough methods, and combat insights."
 xianxia_world.1880.a:0 "Begin the first exchange rounds."

 xianxia_world.1881.t:0 "Dao Exchange Completion"
 xianxia_world.1881.desc:0 "After days of debates, demonstrations, and manual comparisons, your same-path attendees leave with sharpened understanding and improved cultivation rhythm."
 xianxia_world.1881.a:0 "Let insight spread through our path."

 dao_exchange_host_inspiration:0 "Dao Exchange Host Inspiration"
 dao_exchange_host_inspiration_desc:0 "Hosting a same-path feast exchange sharpened this cultivator's insight and leadership among peers."
 dao_exchange_participant:0 "Dao Exchange Participant"
 dao_exchange_participant_desc:0 "Recent same-path Dao exchanges improved this cultivator's study tempo and practical understanding."


 activity_jianghu_grand_gathering:0 "Jianghu Grand Gathering"
 activity_jianghu_grand_gathering_desc:0 "Gather cultivators, rivals, and sect delegates in a multi-phase jianghu summit of honor and prowess."
 jianghu_gathering_phase_arrival:0 "Arrival"
 jianghu_gathering_phase_sparring:0 "Sparring and Duels"
 jianghu_gathering_phase_exchange:0 "Dao Exchanges"
 jianghu_gathering_phase_climax:0 "Climax"

 activity_same_path_dao_exchange:0 "Same-Path Dao Exchange"
 activity_same_path_dao_exchange_desc:0 "A doctrine-aligned exchange where cultivators debate manuals, align philosophy, and refine breakthroughs."
 dao_exchange_phase_arrival:0 "Arrival"
 dao_exchange_phase_discourse:0 "Scripture Discourse"
 dao_exchange_phase_integration:0 "Integration"

 activity_sect_examination:0 "Sect Examination"
 activity_sect_examination_desc:0 "Evaluate aspirants with tiered merit scoring across meridians, bloodline/body talent, and cultivation realm to sort recruits into inner or outer court ranks."
 sect_examination_phase_arrival:0 "Candidate Arrival"
 sect_examination_phase_assessment:0 "Meridian Assessment"
 sect_examination_phase_recruitment:0 "Recruitment Rites"

 xianxia_activity.7300.t:0 "Sect Examination: Arrival"
 xianxia_activity.7300.desc:0 "Aspirants, elders, and examiners gather at your grounds as registration talismans and meridian records are reviewed."
 xianxia_activity.7300.a:0 "Open the examination pavilion."

 xianxia_activity.7310.t:0 "Sect Examination: Assessment"
 xianxia_activity.7310.desc:0 "Candidates demonstrate control, meridian flow, and comprehension of basic cultivation law before assembled elders."
 xianxia_activity.7310.a:0 "Evaluate every contender fairly."

 xianxia_activity.7320.t:0 "Sect Examination: Recruitment"
 xianxia_activity.7320.desc:0 "Final rankings apply tier bonuses from meridians, bloodline/body traits, and realm. High-threshold candidates start in inner court while others enter outer court discipleship."
 xianxia_activity.7320.a:0 "Recruit the strongest prospects."

 activity_inner_court_promotion:0 "Inner Court Promotion"
 activity_inner_court_promotion_desc:0 "A formal review where established disciples are tested and selected for inner court transmission rights."
 inner_court_promotion_phase_review:0 "Record Review"
 inner_court_promotion_phase_trials:0 "Meridian Trials"
 inner_court_promotion_phase_investiture:0 "Inner Court Investiture"

 xianxia_activity.7400.t:0 "Inner Court Promotion: Review"
 xianxia_activity.7400.desc:0 "Genealogies, breakthrough records, and mentor reports are read before the sect dais."
 xianxia_activity.7400.a:0 "Call the candidates."
 xianxia_activity.7410.t:0 "Inner Court Promotion: Trials"
 xianxia_activity.7410.desc:0 "Candidates circulate qi through restrictive arrays to prove control, endurance, and doctrinal discipline."
 xianxia_activity.7410.a:0 "Judge their foundations."
 xianxia_activity.7420.t:0 "Inner Court Promotion: Investiture"
 xianxia_activity.7420.desc:0 "After deliberation, top disciples are accepted into the inner court and granted deeper transmission access."
 xianxia_activity.7420.a:0 "Promote the most worthy."

 activity_elder_promotion:0 "Elder Promotion Assembly"
 activity_elder_promotion_desc:0 "A rare sect convocation where leadership seats are assigned to senior cultivators with proven loyalty and cultivation depth."
 elder_promotion_phase_nominations:0 "Nominations"
 elder_promotion_phase_assessment:0 "Council Assessment"
 elder_promotion_phase_enthronement:0 "Elder Enthronement"

 xianxia_activity.7500.t:0 "Elder Promotion: Nominations"
 xianxia_activity.7500.desc:0 "Inner hall mentors and lineage factions submit names for elder succession."
 xianxia_activity.7500.a:0 "Accept formal nominations."
 xianxia_activity.7510.t:0 "Elder Promotion: Assessment"
 xianxia_activity.7510.desc:0 "Combat records, scripture mastery, and governance conduct are reviewed by senior arbiters."
 xianxia_activity.7510.a:0 "Evaluate each nominee."
 xianxia_activity.7520.t:0 "Elder Promotion: Enthronement"
 xianxia_activity.7520.desc:0 "Only nominees at elder-standard realm thresholds can receive the elder seal, hall authority, and lifetime sect obligations."
 xianxia_activity.7520.a:0 "Install the new elder."

 xianxia_activity.7100.t:0 "Grand Gathering: Arrival"
 xianxia_activity.7100.desc:0 "Sect elders, wandering cultivators, and rivals gather under one banner as the Jianghu Grand Gathering formally opens."
 xianxia_activity.7100.a:0 "Welcome the gathered paths."

 xianxia_activity.7110.t:0 "Grand Gathering: Sparring Phase"
 xianxia_activity.7110.desc:0 "Duel rings and challenge platforms decide who commands respect. Your prowess and composure define the tone of the gathering."
 xianxia_activity.7110.a:0 "Let the matches begin."

 xianxia_activity.7120.t:0 "Grand Gathering: Exchange Phase"
 xianxia_activity.7120.desc:0 "With blades sheathed, elders and disciples exchange techniques, doctrine insights, and sect commitments."
 xianxia_activity.7120.a:0 "Consolidate these alliances."

 xianxia_activity.7130.t:0 "Grand Gathering: Climax"
 xianxia_activity.7130.desc:0 "The final demonstrations settle reputation across the jianghu. The host's standing and legacy are now written."
 xianxia_activity.7130.a:0 "Seal the gathering's outcome."

 xianxia_activity.7200.t:0 "Dao Exchange: Arrival"
 xianxia_activity.7200.desc:0 "Cultivators of the same path arrive to compare manuals, bottlenecks, and practical breakthroughs."
 xianxia_activity.7200.a:0 "Open the exchange hall."

 xianxia_activity.7210.t:0 "Dao Exchange: Discourse"
 xianxia_activity.7210.desc:0 "Scripture interpretations and cultivation theory are tested in respectful but intense debate."
 xianxia_activity.7210.a:0 "Refine our path together."

 xianxia_activity.7220.t:0 "Dao Exchange: Integration"
 xianxia_activity.7220.desc:0 "Participants depart with clarified doctrine and stronger momentum in learning and cultivation."
 xianxia_activity.7220.a:0 "Carry these insights forward."

 view_jianghu_strongest_leaderboard_decision:0 "View Jianghu Strongest Leaderboard"
 view_jianghu_strongest_leaderboard_decision_desc:0 "Check the current jianghu strength tiers generated from gathering and tournament victories, including path-specific ranks."
 view_jianghu_strongest_leaderboard_decision_tooltip:0 "Opens the jianghu ranking board and your recorded wins by overall and path tracks."
 view_jianghu_strongest_leaderboard_decision_confirm:0 "Read the ranking tablets."

 xianxia_world.1891.t:0 "Jianghu Strongest Leaderboard"
 xianxia_world.1891.desc:0 "The latest ranking tablets circulate across inns, mountain sect gates, and city arenas.\n\n#bold Overall Strength Tiers (Prowess-Based):#!\n#emp #1 Under Heaven:#! top living cultivator with the greatest prowess\n#emp #2 Jianghu Titan:#! 24+ prowess\n#emp #3 Renowned Blade:#! 18+ prowess\n\n#bold Path Champion Requirement:#! 18+ prowess within your cultivation path.\n\n#weak Your current prowess:#! [ROOT.GetProwess]\n#weak Your fame tally (legacy):#! [ROOT.Var('jianghu_tourney_wins_total').GetValue]"
 xianxia_world.1891.a:0 "The Jianghu remembers strength."

 jianghu_rank_overall_1:0 "#1 Under Heaven"
 jianghu_rank_overall_1_desc:0 "Currently ranked first on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_overall_2:0 "#2 Jianghu Titan"
 jianghu_rank_overall_2_desc:0 "Currently ranked second on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_overall_3:0 "#3 Renowned Blade"
 jianghu_rank_overall_3_desc:0 "Currently ranked third on the jianghu strongest board by gathering and tourney victories."
 jianghu_rank_path_orthodox_1:0 "Orthodox Path Champion"
 jianghu_rank_path_orthodox_1_desc:0 "A leading orthodox winner in jianghu gatherings and tourneys."
 jianghu_rank_path_unorthodox_1:0 "Unorthodox Path Champion"
 jianghu_rank_path_unorthodox_1_desc:0 "A leading unorthodox winner in jianghu gatherings and tourneys."
 jianghu_rank_path_demonic_1:0 "Demonic Path Champion"
 jianghu_rank_path_demonic_1_desc:0 "A leading demonic winner in jianghu gatherings and tourneys."
 jianghu_rank_path_vagrant_1:0 "Vagrant Path Champion"
 jianghu_rank_path_vagrant_1_desc:0 "A leading vagrant winner in jianghu gatherings and tourneys."

 xianxia_commander_orthodox_guardian:0 "Orthodox Guardian Commander"
 xianxia_commander_orthodox_guardian_desc:0 "Disciplined sect doctrine shapes this command style: resilient lines, stable supply, and controlled-terrain battle plans."
 xianxia_commander_demonic_reaper:0 "Demonic Reaper Commander"
 xianxia_commander_demonic_reaper_desc:0 "Ruthless demonic warfare seeks decisive slaughter through pressure and terror rather than prolonged attrition."
 xianxia_commander_formation_warden:0 "Formation Warden Commander"
 xianxia_commander_formation_warden_desc:0 "Array and talisman mastery turns this commander into a siege-and-terrain specialist anchored by prepared formations."
 xianxia_commander_sword_duelist:0 "Sword Duelist Commander"
 xianxia_commander_sword_duelist_desc:0 "Sword-focused battlefield command emphasizes precision strikes and champion-led breakthroughs."
 xianxia_commander_spear_vanguard:0 "Spear Vanguard Commander"
 xianxia_commander_spear_vanguard_desc:0 "Spear doctrine favors disciplined frontline pressure, pursuit discipline, and sustained field formations."
 xianxia_commander_vagrant_skirmisher:0 "Vagrant Skirmisher Commander"
 xianxia_commander_vagrant_skirmisher_desc:0 "A wandering command style built around mobility logistics, opportunistic siege pressure, and rough-route adaptation."
 xianxia_commander_imperial_marshal:0 "Imperial Marshal Commander"
 xianxia_commander_imperial_marshal_desc:0 "Imperial-sect command doctrine blends authority logistics with control-focused operations and structured siege tempo."

 xianxia_cultivator_champion_protection:0 "Cultivator Champion Protection"
 xianxia_cultivator_champion_protection_desc:0 "This army still has an active designated cultivator champion. Ordinary troop clashes matter less while the champion anchors battlefield momentum."
 xianxia_cultivator_champion_collapse:0 "Cultivator Champion Collapse"
 xianxia_cultivator_champion_collapse_desc:0 "This side has lost its active cultivator champion and the battle line is collapsing rapidly."
 xianxia_cultivator_champion_routed:0 "Cultivator Champion Routed"
 xianxia_cultivator_champion_routed_desc:0 "The designated cultivator champion has been routed from active combat, shaking allied morale."

 challenge_sect_leader_decision:0 "Challenge Sect Leader"
 challenge_sect_leader_decision_desc:0 "Invoke lineage support and challenge your sect's current leader for the Mandate Seat. Success can force abdication; failure stains your name for decades."
 challenge_sect_leader_decision_tooltip:0 "Starts a sect leadership conflict against your liege. #bold Current Authority (Liege):#! [liege.Var('sect_authority_score').GetValue]"
 challenge_sect_leader_decision_confirm:0 "Issue the challenge tablet."

 purge_dissenting_elders_decision:0 "Purge Dissenting Elders"
 purge_dissenting_elders_decision_desc:0 "Crush elder blocs before they split your sect. This raises fear and short-term obedience at the cost of long-term trust."
 purge_dissenting_elders_decision_tooltip:0 "Triggers an elder-faction confrontation with purge, appeasement, or schism outcomes."
 purge_dissenting_elders_decision_confirm:0 "Cleanse the factional rot."

 consecrate_sacred_mountain_decision:0 "Consecrate Sacred Mountain"
 consecrate_sacred_mountain_decision_desc:0 "Bind your capital mountain's spirit veins under formal sect law and ritual. This anchors territorial authority and stabilizes long-term growth."
 consecrate_sacred_mountain_decision_tooltip:0 "Adds a long-duration county modifier to your capital and improves control/development pressures."
 consecrate_sacred_mountain_decision_confirm:0 "Consecrate the mountain gate."

 xianxia_sect_conflict.0100.t:0 "Elder Factions Demand Concessions"
 xianxia_sect_conflict.0100.desc:0 "Lineage elders accuse your hall of favoritism and weak mandate enforcement. If you fail to resolve this, your sect may split or openly defy your authority.\n\n#bold Current Sect Authority:#! [ROOT.Var('sect_authority_score').GetValue]"
 xianxia_sect_conflict.0100.a:0 "Pay stipends and appease the elders."
 xianxia_sect_conflict.0100.b:0 "Purge the loudest dissenters."
 xianxia_sect_conflict.0100.c:0 "Let a schism bleed off pressure."

 xianxia_sect_conflict.0110.t:0 "Sect Schism at the Mountain Gate"
 xianxia_sect_conflict.0110.desc:0 "A faction of elders and disciples has broken discipline and declared a separate hall. The split weakens your direct control and fractures cultivation legitimacy."
 xianxia_sect_conflict.0110.a:0 "Accept the split and preserve the core sect."
 xianxia_sect_conflict.0110.b:0 "Crush the breakaway hall by force."

 xianxia_sect_conflict.0200.t:0 "Challenge the Mandate Seat"
 xianxia_sect_conflict.0200.desc:0 "You can challenge [scope:sect_leader_target.GetTitledFirstName] for sect leadership. Elders and lineage blocs will back strength, cunning, and political momentum."
 xianxia_sect_conflict.0200.a:0 "Challenge openly before the elders."
 xianxia_sect_conflict.0200.b:0 "Not yet. My moment will come."

 xianxia_sect_conflict.0210.t:0 "Sect Leadership Duel"
 xianxia_sect_conflict.0210.desc:0 "Challenge banners rise. One side will leave with the Mandate Seat; the other will carry decades of shame or vengeance."
 xianxia_sect_conflict.0210.a:0 "Let heaven judge this contest."

 xianxia_sect_conflict.0220.t:0 "You Seize the Mandate Seat"
 xianxia_sect_conflict.0220.desc:0 "Your challenge succeeds. The old leader is forced into a diminished elder role while your authority reshapes court loyalties and succession expectations."
 xianxia_sect_conflict.0220.a:0 "From now on, this sect follows my law."

 xianxia_sect_conflict.0230.t:0 "Your Challenge Is Crushed"
 xianxia_sect_conflict.0230.desc:0 "Your claim fails. Rival elders brand you a cautionary tale, and your prestige collapses across jianghu circles."
 xianxia_sect_conflict.0230.a:0 "I endure this humiliation... for now."

 sect_authority_high:0 "High Sect Authority"
 sect_authority_high_desc:0 "This leader maintains broad sect legitimacy and can keep lineages aligned under one mandate."
 sect_authority_low:0 "Low Sect Authority"
 sect_authority_low_desc:0 "This leader's mandate is disputed by elders and lineage blocs, increasing internal fragmentation."
 sect_elder_faction_pressure:0 "Elder Faction Pressure"
 sect_elder_faction_pressure_desc:0 "Competing elder blocs are pressing competing heirs, privileges, and policy demands."
 sect_schism_recent:0 "Recent Sect Schism"
 sect_schism_recent_desc:0 "A breakaway hall split from this sect, damaging cohesion and realm stability."
 sect_purge_aftermath:0 "Purge Aftermath"
 sect_purge_aftermath_desc:0 "Dissent was crushed violently, increasing fear but poisoning internal trust."
 sect_lineage_backed_heir:0 "Lineage-Backed Heir"
 sect_lineage_backed_heir_desc:0 "A strong lineage bloc currently supports this cultivator for future leadership conflict."
 sect_challenger_glory:0 "Sect Challenger's Glory"
 sect_challenger_glory_desc:0 "This cultivator won a leadership challenge and now carries overwhelming sect momentum."
 sect_challenger_disgraced:0 "Disgraced Challenger"
 sect_challenger_disgraced_desc:0 "A failed leadership challenge shattered this cultivator's prestige and political capital."
 sect_forced_abdication_shame:0 "Forced Abdication Shame"
 sect_forced_abdication_shame_desc:0 "This former sect leader was publicly displaced in a mandate challenge."
 sect_exiled_elder:0 "Exiled Elder"
 sect_exiled_elder_desc:0 "This elder was driven out during internal sect purges and faction cleansing."

 sacred_mountain_consecrated:0 "Consecrated Sacred Mountain"
 sacred_mountain_consecrated_desc:0 "Sect rituals stabilized this mountain's spirit veins, improving local order and cultivation throughput."
 spirit_vein_secured:0 "Secured Spirit Vein"
 spirit_vein_secured_desc:0 "Stable sect governance has secured local spirit-vein discipline and military readiness."
 spirit_vein_contested:0 "Contested Spirit Vein"
 spirit_vein_contested_desc:0 "Rival sect pressure and internal instability are disrupting spirit-vein control."
 corrupted_spirit_vein:0 "Corrupted Spirit Vein"
 corrupted_spirit_vein_desc:0 "The local spiritual flow is unstable and tainted, feeding intrigue and disorder."

 establish_sect_branch_hall_decision:0 "Establish Sect Branch Hall"
 establish_sect_branch_hall_decision_desc:0 "Found a branch hall in one of your domain counties to anchor local sect influence and long-term spirit-vein discipline."
 establish_sect_branch_hall_decision_tooltip:0 "Selects a valid domain county and grants secured spirit-vein benefits, development growth, and control support."
 establish_sect_branch_hall_decision_confirm:0 "Raise a branch hall."

 corrupt_spirit_vein_decision:0 "Corrupt Spirit Vein"
 corrupt_spirit_vein_decision_desc:0 "Twist your capital's spiritual flow through forbidden methods. This boosts coercive politics but destabilizes county order."
 corrupt_spirit_vein_decision_tooltip:0 "Demonic/unorthodox rulers can convert stable spirit-vein control into a corruption model."
 corrupt_spirit_vein_decision_confirm:0 "Let corruption spread."

 enforce_high_realm_submission_decision:0 "Enforce High-Realm Submission"
 enforce_high_realm_submission_decision_desc:0 "Demonstrate overwhelming realm pressure so weaker rulers and courtiers bend to your cultivation hierarchy."
 enforce_high_realm_submission_decision_tooltip:0 "Applies long-duration submission/deference effects to vassals and cultivator courtiers."
 enforce_high_realm_submission_decision_confirm:0 "Kneel before higher heaven."

 xianxia_sect_conflict.0300.t:0 "Spirit Vein Contest in the Capital"
 xianxia_sect_conflict.0300.desc:0 "Rival sect agents and internal dissidents are contesting your capital's spiritual arteries. If left unchecked, your county control and sect authority will erode."
 xianxia_sect_conflict.0300.a:0 "Deploy elders and suppress the contest."
 xianxia_sect_conflict.0300.b:0 "Withdraw and consolidate elsewhere."

 high_realm_mandate_presence:0 "High-Realm Mandate Presence"
 high_realm_mandate_presence_desc:0 "The ruler's overwhelming cultivation realm imposes political gravity on the entire court and vassal structure."
 high_realm_suppressed_vassal:0 "Suppressed by High-Realm Presence"
 high_realm_suppressed_vassal_desc:0 "This ruler operates under the shadow of a far stronger cultivator authority."
 high_realm_court_deference:0 "Court Deference to Higher Realm"
 high_realm_court_deference_desc:0 "This cultivator suppresses independent expression around a high-realm sovereign."
 opinion_high_realm_submission:0 "Forced High-Realm Submission"

 view_xianxia_state_status_decision:0 "View Xianxia State Report"
 view_xianxia_state_status_decision_desc:0 "Review your current realm/cultivation status including authority, cooldowns, and territorial pressure states."
 view_xianxia_state_status_decision_tooltip:0 "Opens a readable status report for cultivation, sect, county, and special-state tracking."
 view_xianxia_state_status_decision_confirm:0 "Open the report tablet."

 xianxia_sect_succession.0010.t:0 "Sect Succession Crisis"
 xianxia_sect_succession.0010.desc:0 "Your succession is disputed by elders, lineages, and opportunists. No sect leadership transition is ever peaceful.\n\n#bold Sect Authority:#! [ROOT.Var('sect_authority_score').GetValue]"
 xianxia_sect_succession.0010.a:0 "I will survive the storm."

 xianxia_sect_succession.0015.t:0 "Leadership Vacuum"
 xianxia_sect_succession.0015.desc:0 "No stable heir stands ready. Elders force an emergency settlement to prevent the sect from collapsing immediately."
 xianxia_sect_succession.0015.a:0 "Install an emergency regent."

 xianxia_sect_succession.0020.t:0 "Elder Coup"
 xianxia_sect_succession.0020.desc:0 "Senior elders reject your inheritance and force a coup-backed transfer of authority."
 xianxia_sect_succession.0020.a:0 "The mandate is stolen from my line."

 xianxia_sect_succession.0030.t:0 "Sect Schism"
 xianxia_sect_succession.0030.desc:0 "Lineages split, disciples defect, and your sect fractures into hostile camps."
 xianxia_sect_succession.0030.a:0 "Stabilize what remains."

 xianxia_sect_succession.0040.t:0 "Claimant Civil Conflict"
 xianxia_sect_succession.0040.desc:0 "A claimant bloc rejects your leadership and starts organizing long-term faction pressure."
 xianxia_sect_succession.0040.a:0 "Then let them come."

 xianxia_sect_succession.0900.t:0 "Xianxia State Report"
 xianxia_sect_succession.0900.desc:0 "#bold Cultivation/Sect State:#!\nSect Authority Score: [ROOT.Var('sect_authority_score').GetValue]\nJianghu Wins (Total): [ROOT.Var('jianghu_tourney_wins_total').GetValue]\nJianghu Wins (Orthodox): [ROOT.Var('jianghu_tourney_wins_orthodox').GetValue]\nJianghu Wins (Unorthodox): [ROOT.Var('jianghu_tourney_wins_unorthodox').GetValue]\nJianghu Wins (Demonic): [ROOT.Var('jianghu_tourney_wins_demonic').GetValue]\nJianghu Wins (Vagrant): [ROOT.Var('jianghu_tourney_wins_vagrant').GetValue]\n\n#bold Status Checklist (manual read):#!\n- Check if you have [GetModifier('sect_succession_crisis').GetNameWithTooltip], [GetModifier('sect_claimant_faction_pressure').GetNameWithTooltip], or [GetModifier('high_realm_mandate_presence').GetNameWithTooltip].\n- Check your capital county for [GetModifier('sacred_mountain_consecrated').GetNameWithTooltip], [GetModifier('spirit_vein_secured').GetNameWithTooltip], [GetModifier('spirit_vein_contested').GetNameWithTooltip], [GetModifier('corrupted_spirit_vein').GetNameWithTooltip].\n- Check your flags/cooldowns in tooltips for breakthrough resource cooldown, high-realm submission cooldown, and fox exposure."
 xianxia_sect_succession.0900.a:0 "Close report."

 sect_succession_crisis:0 "Sect Succession Crisis"
 sect_succession_crisis_desc:0 "This sect's succession is actively contested by rival lineages and claimants."
 sect_claimant_faction_pressure:0 "Claimant Faction Pressure"
 sect_claimant_faction_pressure_desc:0 "A claimant bloc is consolidating support against the current sect leadership."
 sect_failed_heir_exile:0 "Failed Heir in Exile"
