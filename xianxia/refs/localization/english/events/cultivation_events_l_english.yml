#Regular events
  cultivation_regular_event.101.t:0 "Mysterious seller"
  cultivation_regular_event.101.desc:0 "A cultivator approaches looking to sell one of his items. He claims he has a mystical herb, capable of aiding you with your cultivation."
  cultivation_regular_event.101.a:0 "Steal it and consume the herb"
  cultivation_regular_event.101.b:0 "Steal it and save the herb"
