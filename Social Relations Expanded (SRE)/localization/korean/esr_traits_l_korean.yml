l_korean:
  trait_esr_social_standing_neutral:0 "사회적 인물"
  trait_esr_social_standing_good:0 "연줄이 넓은 인물"
  trait_esr_social_standing_bad:0 "사회적 추방자"
  trait_esr_social_standing_mixed:0 "엇갈린 평가"
  trait_track_esr_well_connected:0 "사회적 인맥"
  trait_track_esr_well_connected_desc:0 "성대한 성의 대연회장을 수놓은 정교한 태피스트리처럼, 고귀한 마음은 수많은 인연을 엮어 삶의 여정을 풍요와 즐거움으로 장식한다."
  trait_track_esr_popular_among_peers:0 "동료들 사이의 명성"
  trait_track_esr_popular_among_peers_desc:0 "봉신의 명성이 전당에 울려 퍼질 때, 신중한 주군은 울려 퍼지는 찬사뿐 아니라 속삭이는 우려에도 귀를 기울인다."
  trait_track_esr_friends_in_high_places:0 "권력자들과의 친분"
  trait_track_esr_friends_in_high_places_desc:0 "높은 자리에 있는 벗들과 나란히 설 때, 자신의 운명 또한 고양되니, 권력과 영향력의 전당에서는 아직 열리지 않은 기회의 문들이 활짝 열린다."
  trait_track_esr_social_pariah:0 "경쟁자들의 중상"
  trait_track_esr_social_pariah_desc:0 "강력한 적들의 독설에서 비롯된 중상은 마음을 좀먹고 명성을 더럽히며, 진실을 옹호하는 해가 진 뒤에도 오래도록 그림자를 드리운다."
  trait_esr_social_standing_neutral_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip] 삶은 [ROOT.Char.GetSheHe]가 맺어온 친구와 적들로 인해 여러 방면에서 영향을 받고 있다."
  trait_esr_social_standing_good_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip] 탄탄히 다져진 사회적 교류망은 외교와 책략에서 [ROOT.Char.GetHerHis] 수고를 덜어준다."
  trait_esr_social_standing_bad_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]에게 수많은 강적들이 퍼뜨린 이야기들은 [ROOT.Char.GetHerHis] 모습을 보기 좋지 않게 그려 왔다. 진실 여부와는 무관하게, 현 권력자들을 감히 노엽게 만드는 자를 두려워하지 않기란 쉽지 않다."
  trait_esr_social_standing_mixed_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]의 이름은 사람마다 서로 다른 의미를 지닌다. [ROOT.Char.GetHerHim]에 대해 물을수록, [ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]의 성품에 대해서는 오히려 더 알 수 없게 된다."

  TRAIT_FLAG_DESC_esr_increased_swing_relation:0 ""
