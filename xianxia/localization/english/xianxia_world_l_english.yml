embrace_fox_spirit_predation_decision_confirm:0 "Accept the hunger."

hunt_mortals_fox_spirit_decision:0 "Hunt Mortals in Your Domain"
hunt_mortals_fox_spirit_decision_desc:0 "You stalk weak mortals in your lands to harvest vitality and sharpen your predatory arts."
hunt_mortals_fox_spirit_decision_tooltip:0 "Gain a strong lifestyle-speed boost, but non-fox and non-demonic/unorthodox cultivators will loathe you."
hunt_mortals_fox_spirit_decision_confirm:0 "Begin the night hunt."

fox_spirit_mortal_hunt_frenzy:0 "Fox-Spirit Mortal Hunt Frenzy"
fox_spirit_mortal_hunt_frenzy_desc:0 "This fox spirit has recently hunted mortal prey, accelerating insight through ruthless predation."

opinion_fox_spirit_mortal_hunter:0 "Hunts Mortals for Cultivation"

xianxia_world.2260.t:0 "Predator's Oath"
xianxia_world.2260.desc:0 "You no longer deny what your fox-spirit blood craves. Mortal essence becomes fuel, and your path darkens."
xianxia_world.2260.a:0 "I accept the predation dao."

xianxia_world.2261.t:0 "Moonlit Mortal Hunt"
xianxia_world.2261.desc:0 "Under cover of night, you harvest mortal vitality in your own domain. Power surges, but rumors spread like wildfire."
xianxia_world.2261.a:0 "Let fear feed my path."

