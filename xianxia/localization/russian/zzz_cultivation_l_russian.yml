 cultivation_sect_visit.2000.desc:0 "Тёмная ци пропитывает воздух, когда я вхожу в демоническую секту. Просветлённые с кроваво-красными глазами наблюдают из тени. Это место, где сила — это всё, а слабые пожираются сильными. Мою душу наполняет всепоглощающее чувство опасности."
