l_english:
  trait_yang_constitution:0 "Yang constitution"
  trait_yang_constitution_desc:0 "A yang focused constitution. Exclusive to males, allow for a special cultivation if paired with a yin constitution cultivator (WIP, not yet implemented). All constitutions increase cultivation speed"
  trait_yang_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has a yang constitution. Allows for faster cultivation" 

  trait_yin_constitution:0 "Yin constitution"
