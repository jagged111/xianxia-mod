 cultivation_breakthrough.2100.t:0 "True Immortal Breakthrough"
 cultivation_breakthrough.2100.desc:0 "The ultimate transformation awaits. Beyond Nirvana lies True Immortality - eternal existence, unchanging and undying. This is the peak of cultivation!"
