 xianxia_artifact_voidstep_boots_name:0 "Voidstep Boots"
 xianxia_artifact_voidstep_boots_desc:0 "Lightweight spirit boots woven with space-step runes, allowing sudden shifts in travel and battlefield positioning."
 xianxia_artifact_starfall_talisman_name:0 "Starfall Talisman"
 xianxia_artifact_starfall_talisman_desc:0 "A layered talisman strip that calls down mote-like astral force to bolster formations and battle momentum."
 xianxia_artifact_mirror_of_true_heart_name:0 "Mirror of True Heart"
 xianxia_artifact_mirror_of_true_heart_desc:0 "A polished treasure mirror that reflects inner demons and calms the wielder's Dao heart."
 xianxia_artifact_thunder_seal_bracelet_name:0 "Thunder-Seal Bracelet"
 xianxia_artifact_thunder_seal_bracelet_desc:0 "A ringed wrist-seal filled with crackling lightning qi that enhances burst power in close combat."
 xianxia_artifact_emerald_lotus_robe_name:0 "Emerald Lotus Robe"
 xianxia_artifact_emerald_lotus_robe_desc:0 "A spirit-silk robe infused with lotus wood essence, prized for restorative and anti-corruption properties."
 xianxia_artifact_mount_kunlun_inkstone_name:0 "Mount Kunlun Inkstone"
 xianxia_artifact_mount_kunlun_inkstone_desc:0 "An inscription master's inkstone that stabilizes scripture copying and talisman pattern accuracy."
 xianxia_artifact_ancestral_spirit_banner_name:0 "Ancestral Spirit Banner"
 xianxia_artifact_ancestral_spirit_banner_desc:0 "A war banner inhabited by faint ancestral echoes, raising morale among loyal cultivators."
 seek_legendary_world_artifact_decision:0 "Seek Legendary World Artifact"
 seek_legendary_world_artifact_decision_desc:0 "Rumors speak of world-shaking relics hidden in forbidden ruins where arrays, ancient guardians, and heavenly punishment kill almost all seekers. Without exceptional cultivation and extreme personal aptitude, this pursuit is nearly suicide."
 seek_legendary_world_artifact_decision_tooltip:0 "Attempt an ultra-lethal expedition for legendary artifacts. Failing the extreme stat checks leads to near-certain death."
 seek_legendary_world_artifact_decision_confirm:0 "Enter the forbidden ruin."

 xianxia_world.1810.t:0 "The Forbidden Relic Vault"
 xianxia_world.1810.desc:0 "At the heart of a collapsed secret world, a relic vault opens beneath blood-red lightning. Corpse mountains of failed cultivators surround the gate. One wrong step means annihilation.\n\nOnly those with absurdly high mastery can survive the core arrays. All others face a near-confirmed death sentence."
 xianxia_world.1810.a:0 "Break the formation with absolute confidence."
 xianxia_world.1810.b:0 "Force entry despite lacking peak mastery."
 xianxia_world.1810.c:0 "Withdraw. This is not my destined calamity."

