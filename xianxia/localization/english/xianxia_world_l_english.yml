 xianxia_world.1870.b:0 "Cancel the gathering."

 xianxia_world.1871.t:0 "Jianghu Gathering - Rivalry Stage"
 xianxia_world.1871.desc:0 "As rounds progress, alliances and rivalries reshape the gathering's momentum. Outcomes now branch like a tournament mid-phase."
 xianxia_world.1871.a:0 "Push through the rivalry stage."

 xianxia_world.1872.t:0 "Jianghu Gathering - Final Stage"
 xianxia_world.1872.desc:0 "The final exchanges settle reputation and sect standing. Your hosting prestige is decided in this closing phase."
 xianxia_world.1872.a:0 "Conclude the grand gathering."

