 seek_legendary_world_artifact_decision_desc:0 "Rumors speak of world-shaking relics hidden in forbidden ruins where arrays, ancient guardians, and heavenly punishment kill almost all seekers. Without exceptional cultivation and extreme personal aptitude, this pursuit is nearly suicide."
 seek_legendary_world_artifact_decision_tooltip:0 "Attempt an ultra-lethal expedition for legendary artifacts. Failing the extreme stat checks leads to near-certain death."
 seek_legendary_world_artifact_decision_confirm:0 "Enter the forbidden ruin."

 xianxia_world.1810.t:0 "The Forbidden Relic Vault"
 xianxia_world.1810.desc:0 "At the heart of a collapsed secret world, a relic vault opens beneath blood-red lightning. Corpse mountains of failed cultivators surround the gate. One wrong step means annihilation.\n\nOnly those with absurdly high mastery can survive the core arrays. All others face a near-confirmed death sentence."
 xianxia_world.1810.a:0 "Break the formation with absolute confidence."
 xianxia_world.1810.b:0 "Force entry despite lacking peak mastery."
 xianxia_world.1810.c:0 "Withdraw. This is not my destined calamity."

