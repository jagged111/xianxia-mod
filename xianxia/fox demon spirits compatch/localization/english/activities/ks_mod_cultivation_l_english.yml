 ks_cultivation.0009.t: "End of Cultivation"
 ks_cultivation.0009.desc: "After months of cultivation, your abilities as a Fox Spirit have been honed, bringing you closer to becoming a powerful Fox Spirit. As you pack your belongings and begin your journey home, you look back to see your teacher and classmates waving at you with smiles."
 ks_cultivation.0009.a: "Farewell!"
 ks_cultivation.0010.t: "Arrive at Cultivation Site [location.GetBaronyNameExplicitlyNoTooltip]"
 ks_cultivation.0010.desc_end: "As arranged, I arrived at a secluded forest in [location.GetBaronyNameExplicitly], where a figure emerged from the shadows, their pale fox ears and tail strikingly visible.\n“From today, I will be your cultivation mentor,” they said.\n“Are you ready? You will explore the subtleties of the world, learn the secrets of magic and strategy, and through cultivation, embark on the path to becoming a powerful Fox Spirit.”"
 ks_cultivation.0010.a: "I am ready"
 ks_cultivation.1000.t: "Lesson – Seduction Techniques"
 ks_cultivation.1000.desc: "“Fox Spirit cultivation requires vital essence. Since ancient times, Fox Spirits have seduced humans to gain essence and enhance their magical power. To seduce a human…”\nTeacher [teacher.GetFirstNameNoTooltip] sat leisurely on a large stone, explaining the art of seduction, while the students, including me, clearly felt a bit sleepy."
 ks_cultivation.1000.a: "I should focus"
 ks_cultivation.1000.a.tt: "Paying close attention will help advance your cultivation progress"
 ks_cultivation.1000.a.success: "You succeeded"
 ks_cultivation.1000.a.success.tt: "You have understood the secret of seduction"
 ks_cultivation.1000.a.failure: "You feel dizzy"
 ks_cultivation.1000.a.failure.tt: "It seems your learning is not going well"
 ks_cultivation.1000.b: "Maybe I should 'seduce' my classmate"
 ks_cultivation.1000.b.tt: "Hey, that person is either paying attention or daydreaming"
 ks_cultivation.1000.b.success: "You succeeded"
 ks_cultivation.1000.b.success.tt: "You startled them by sneaking up, causing them to jump"
 ks_cultivation.1000.b.failure: "Your attempt was discovered"
 ks_cultivation.1000.b.failure.tt: "They pushed you away, and everyone saw it"
 ks_cultivation.1000.c: "I should study something I'm interested in"
 goodgoodstudy_log: "[CHARACTER.GetTitledFirstName|U] studies diligently"
 goodgoodstudy_log_title: "Diligent Study"
 joking_log: "[CHARACTER.GetTitledFirstName|U] played pranks during cultivation"
 joking_log_title: "Pranks"
 ks_cultivation_tt_positive_medium: "#P Moderate cultivation progress#!"
 ks_cultivation_tt_positive_tiny: "#P Minor cultivation progress#!"
 ks_cultivation_tt_positive_major: "#P Significant cultivation progress#!"
 ks_cultivation_tt_positive_huge: "#P Major cultivation progress#!"
 ks_cultivation_tt_positive_massive: "#P Massive cultivation progress#!"

 ks_cultivation.1010.t: "Lesson – Dual Cultivation"
 ks_cultivation.1010.desc: "“You can cultivate together with another, which also enhances Fox Spirit skills. But [ROOT.Char.GetFirstNameNoTooltip], do you understand the meaning of dual cultivation…”\nTeacher [teacher.GetFirstNameNoTooltip] smiled knowingly."
 ks_cultivation.1010.a: "Yes"
 ks_cultivation.1010.a.tt: "This depends on your experience in seduction"
 ks_cultivation.1010.a.success: "You answered correctly"
 ks_cultivation.1010.a.success.tt: "You understood the teacher’s instruction"
 ks_cultivation.1010.a.failure: "Ah, is it a duel between two?"
 ks_cultivation.1010.a.failure.tt: "You misunderstood"
 ks_cultivation.1010.b: "[student.GetFirstName], come for dual cultivation"
 ks_cultivation.1010.b.tt: "Convince the other through persuasion, even if neither of you fully understands dual cultivation"
 ks_cultivation.1010.b.success: "You persuaded [student.GetHerHis]"
 ks_cultivation.1010.b.success.tt: "[student.GetHerHis] agreed"
 ks_cultivation.1010.b.failure: "You failed to persuade"
 ks_cultivation.1010.b.failure.tt: "[student.GetHerHis] turned away"
 ks_cultivation.1010.c: "I should cultivate what interests me"
 ks_cultivation.1020.t: "Lesson – Fox Spirit Blood"
 ks_cultivation.1020.desc: "“Fox Spirits should ideally fall in love with other Fox Spirits, but human-Fox Spirit romances have occurred throughout history. As a result, children born from these relationships carry Fox Spirit blood, which may manifest at an unknown time. Neither fully human nor fully Fox Spirit, forbidden love often leads to tragic outcomes…”\nTeacher [teacher.GetFirstNameNoTooltip] sat under a pine tree, sighing softly."
 ks_cultivation.1020.a: "Listen carefully"
 ks_cultivation.1020.a.tt: "Even if the lesson seems boring, it is important"
 ks_cultivation.1020.a.success: "You focused"
 ks_cultivation.1020.a.success.tt: "You paid attention and learned about Fox Spirit blood inheritance"
 ks_cultivation.1020.a.failure: "You got distracted"
 ks_cultivation.1020.a.failure.tt: "Fox Spirits? That butterfly over there is more interesting"
 ks_cultivation.1020.b: "Fox Spirit Blood – I should make [student.GetFirstName] bleed a bit"
 ks_cultivation.1020.b.tt: "You attempt a prank on [student.GetFirstName] from behind"
 ks_cultivation.1020.b.success: "You poked [student.GetHerHis]"
 ks_cultivation.1020.b.success.tt: "[student.GetHerHis] got startled"
 ks_cultivation.1020.b.failure: "You were discovered"
 ks_cultivation.1020.b.failure.tt: "[student.GetHerHis] scolded you"
 ks_cultivation.1020.c: "I should cultivate what interests me"

 ks_cultivation.1030.t: "Lesson – Fox Spirit Romance"
 ks_cultivation.1030.desc: "“The Fox Spirit population is in crisis. At the current rate, one day they may vanish from the world, existing only in stories. You must find partners, produce offspring, and strengthen the Fox Spirit lineage. As someone who has gone through this, I will teach you techniques to deepen affection…”\nTeacher [teacher.GetFirstNameNoTooltip] seemed lost in past memories."
 ks_cultivation.1030.a: "Listen carefully"
 ks_cultivation.1030.a.tt: "In the future, you will be able to date other Fox Spirits and develop bonds beyond lovers and soulmates"
 ks_cultivation.1030.a.success: "You focused"
 ks_cultivation.1030.a.success.tt: "You paid attention and learned techniques to enhance Fox Spirit relationships"
 ks_cultivation.1030.a.failure: "You got distracted"
 ks_cultivation.1030.a.failure.tt: "You drifted into a dream, dating a Fox Spirit partner until the teacher woke you"
 ks_cultivation.1030.b: "I just want to become stronger"
 ks_cultivation.1030.b.tt: "You are indifferent to romance"
 ks_cultivation.1030.c: "I should cultivate what interests me"

 ks_cultivation.1040.t: "The Greatest Fox"
 ks_cultivation.1040.desc: "“Once there was the greatest Fox Spirit, who seduced a Chinese emperor, attempted to seize his empire, and summoned ghost soldiers to engage in unimaginable magical battles. Nine tails marked her immense power; few Fox Spirits in history possessed nine tails…”\nTeacher [teacher.GetFirstNameNoTooltip] spoke with great enthusiasm."
 ks_cultivation.1040.a: "One day, I will become the greatest Fox"
 ks_cultivation.1040.a.tt: "You will achieve this in the future"
 ks_cultivation.1040.b: "Better to train seriously than boast"
 ks_cultivation.1040.b.tt: "You redoubled your cultivation efforts"
 ks_cultivation.1040.c: "I should cultivate what interests me"
 ks_cultivation.1040.c.tt: "(In future MOD versions) In the 12th century, this Fox Spirit will appear again"
 ks_cultivation.1100.t: "Cultivation – Art of Deception"
 ks_cultivation.1100.desc: "You arrive at a town to practice a Fox Spirit cultivation project – the Art of Deception. In the marketplace, you see a peasant selling some fruits and making a bit of money. Perhaps [peasant.GetHerHis] is a good subject for practice."
 ks_cultivation.1100.a: "Use strategy"
 ks_cultivation.1100.a.tt: "You attempt to deceive the peasant as part of your cultivation"
 ks_cultivation.1100.a.success: "You succeeded"
 ks_cultivation.1100.a.success.tt: "You gained some money and improved your mastery of deception"
 ks_cultivation.1100.a.failure: "You failed"
 ks_cultivation.1100.a.failure.tt: "Further practice is needed"
 ks_cultivation.1100.b: "Use magic"
 ks_cultivation.1100.b.tt: "You attempt to frighten the peasant with magic"
 ks_cultivation.1100.b.success: "[peasant.GetHerHis] was frightened"
 ks_cultivation.1100.b.success.tt: "You took [peasant.GetHerHis]'s money, though this was not your main goal"
 ks_cultivation.1100.b.failure: "You failed to scare [peasant.GetHerHis]"
 ks_cultivation.1100.b.failure.tt: "[peasant.GetHerHis] was bold"
 ks_cultivation.1100.c: "Forget it"
 ks_cultivation.1100.c.tt: "You wandered around the marketplace"

 ks_cultivation.1110.t: "Cultivation – Art of Seduction"
 ks_cultivation.1110.desc: "You arrive at a small village to practice a Fox Spirit cultivation project – the Art of Seduction. Peeking through a small window, you see a captivating beauty inside. It seems you came to the right place."
 ks_cultivation.1110.a: "Seduce [beautiful_peasant.GetHerHis]"
 ks_cultivation.1110.a.tt: "This is what a Fox Spirit should do; it is your cultivation task"
 ks_cultivation.1110.a.success: "You succeeded"
 ks_cultivation.1110.a.success.tt: "You flirted with [beautiful_peasant.GetHerHis] and absorbed [her/his] vital essence"
 ks_cultivation.1110.a.failure: "[beautiful_peasant.GetHerHis] didn’t notice you"
 ks_cultivation.1110.a.failure.tt: "No effect"
 ks_cultivation.1110.b: "My heart is racing"
 ks_cultivation.1110.b.tt: "You fell in love at first sight with [beautiful_peasant.GetHerHis]"
 ks_cultivation.1110.c: "Forget it"
 ks_cultivation.1110.c.tt: "You went back to sleep"

 ks_cultivation.1120.t: "Cultivation – Challenge the Ghost"
 ks_cultivation.1120.desc: "“There’s a huge ghost in the forest. Last night I saw it – at least three… no, five people tall,”\n[student.GetFirstNameNoTooltip] said mischievously, “Sorry, I forgot you’re afraid of ghosts, haha, hope it doesn’t come tonight.”\n“I will personally defeat it,” you said, though nervous. At night, a commotion arose in the forest; outside your cultivation tent, a huge shadow appeared, and you could see its menacing face with sharp fangs."
 ks_cultivation.1120.a: "I will fight"
 ks_cultivation.1120.a.tt: "You muster courage and prepare to challenge the ghost with magic"
 ks_cultivation.1120.a.success: "Your spell obliterated the ghost"
 ks_cultivation.1120.a.success.tt: "You realize it was made of stones, branches, and paper"
 ks_cultivation.1120.a.failure: "You were hit by the ghost’s claw before casting a spell"
 ks_cultivation.1120.a.failure.tt: "You got injured"
 ks_cultivation.1120.b: "Wait, I read about this in a book"
 ks_cultivation.1120.b.tt: "Using a spell, you splash water on the ghost, and it quickly crumbles into branches and stones"
 ks_cultivation.1120.c: "Check the book for a solution"
 ks_cultivation.1120.c.tt: "You find an answer in the book and avoid the ghost using your knowledge"
 ks_cultivation.1130.t: "Research – Elixir of Immortality"
 ks_cultivation.1130.desc: "Today the teacher assigned the study of the Elixir of Immortality, which, as the name suggests, is a potion that grants eternal life and everlasting youth. Many ancient Chinese emperors searched the entire empire for it, but no one ever found it.\n[student.GetFirstNameNoTooltip] told you about an ancient book containing the recipe, requiring the collection of various herbs."
 ks_cultivation.1130.a: "Sounds reasonable"
 ks_cultivation.1130.a.tt: "You spent three days gathering herbs and became a master herbalist"
 ks_cultivation.1130.b: "The elixir doesn’t exist"
 ks_cultivation.1130.b.tt: "You refuted [student.GetFirstNameNoTooltip] with your knowledge"
 ks_cultivation.1130.c: "Better to have a good meal"
 ks_cultivation.1130.c.tt: "You believe that good food is the secret to health"
 ks_cultivation.1130.d: "I’m not interested"
 ks_cultivation.1130.d.tt: "You went back to sleep"

 ks_cultivation.1140.t: "Relaxation – Board Games"
 ks_cultivation.1140.desc: "Your teacher [teacher.GetFirstNameNoTooltip] thinks you’ve been training too hard and invites you to play board games for relaxation. You arrive at a large flat stone. [teacher.GetFirstNameNoTooltip] spreads out a cloth bag on it, revealing maps, flags, and various small items.\n“I brought four games from my collection:\n\nThe first is 'Hearts of Iron.' See these iron pieces? You’ll use them to simulate wars – grand battles you’ve never seen.\nThe second is 'Europa Universalis,' where you expand territories and explore the world, as long as you expand faster than me.\nThe third is 'Victoria,' named after a queen. If you like economics and management, this is for you.\nFinally, 'Crusader Kings.' You will play as a king, count, or even a wanderer, just like now!\n\nWhich one do you want to play?”"
 ks_cultivation.1140.a: "Hearts of Iron"
 ks_cultivation.1140.a.tt: "You unified the entire map as Germany"
 ks_cultivation.1140.b: "Europa Universalis"
 ks_cultivation.1140.b.tt: "You chose to play as a nation called 'Ming,' which seems powerful"
 ks_cultivation.1140.c: "Victoria"
 ks_cultivation.1140.c.tt: "Why is the standard of living of my people decreasing?"
 ks_cultivation.1140.d: "Crusader Kings"
 ks_cultivation.1140.d.tt: "You feel a bit dizzy"
 ks_cultivation.1140.d.good1: "You grasped the truths of this world"
 ks_cultivation.1140.d.bad1: "You feel lightheaded"
 ks_cultivation.1140.d.bad2: "For some reason, you feel unwell"
 ks_cultivation.1140.d.bad3: "You still kept playing"

 ks_cultivation.1200.t: "Fox Hunter"
 ks_cultivation.1200.desc: "While meditating by the lake, suddenly an arrow whizzes past, and a fox falls from the nearby grass.\n“Sorry to scare you,” a hunter says, approaching with a bow. “This is my job. As you can see, I am a hunter.”\n[peasant.GetHerHis] picks up the struggling fox, muttering, “Its fur would make a fine hat.”"
 ks_cultivation.1200.a: "Better to let it go"
 ks_cultivation.1200.a.tt: "You persuade the hunter to release the fox"
 ks_cultivation.1200.a.success: "You succeeded"
 ks_cultivation.1200.a.success.tt: "The hunter reluctantly leaves"
 ks_cultivation.1200.a.failure: "You failed to persuade [peasant.GetHerHis]"
 ks_cultivation.1200.a.failure.tt: "The hunter ignored you and walked away"
 ks_cultivation.1200.b: "A hat? You need a head first!"
 ks_cultivation.1200.b.tt: "You are enraged by the hunter killing the fox"
 ks_cultivation.1200.b.success: "You killed the hunter"
 ks_cultivation.1200.b.success.tt: "Your spell made the hunter collapse"
 ks_cultivation.1200.b.failure: "The hunter ran away"
 ks_cultivation.1200.b.failure.tt: "Your magic training is still insufficient"
 ks_cultivation.1200.c: "Continue cultivation"
 ks_cultivation.1200.c.tt: "You advanced in your cultivation"
 ks_cultivation.1210.t: "Monk Attack"
 ks_cultivation.1210.desc: "While training in the wilderness, you see an angry monk approaching from afar.\n[monk.GetHerHis] says, 'I heard a group of foxes has been training here recently. I am here to drive out these demons. Do you have any information?'"
 ks_cultivation.1210.a: "This monk is quite good-looking"
 ks_cultivation.1210.a.tt: "You try to seduce [monk.GetHerHis] and make [monk.GetHerHis] lose chastity"
 ks_cultivation.1210.a.success: "You succeeded, boosting your confidence in seduction skills"
 ks_cultivation.1210.a.success.tt: "[monk.GetHerHis] is a lecherous monk"
 ks_cultivation.1210.a.failure: "[monk.GetHerHis] remains steadfast"
 ks_cultivation.1210.a.failure.tt: "Alas, no fun"
 ks_cultivation.1210.b: "I am a fox"
 ks_cultivation.1210.b.tt: "You start a magical duel"
 ks_cultivation.1210.b.success: "You defeated [monk.GetHerHis]"
 ks_cultivation.1210.b.success.tt: "[monk.GetHerHis] dies in the duel"
 ks_cultivation.1210.b.failure: "You are injured"
 ks_cultivation.1210.b.failure.tt: "Your magic training is still insufficient"
 ks_cultivation.1210.c: "Continue cultivation"
 ks_cultivation.1210.c.tt: "You ignore [monk.GetHerHis] and advance your training"

 ks_cultivation.1220.t: "Fox Troubles"
 ks_cultivation.1220.desc: "You confide your troubles as a fox spirit to your teacher [teacher.GetFirstNameNoTooltip]. Despite having many abilities and attracting others, you often face hostility from the same sex, causing difficulties in life.\nYour teacher smiles mysteriously: 'Come to the big tree at midnight every day from now on.'"
 ks_cultivation.1220.a: "Alright, teacher"
 ks_cultivation.1220.a.tt: "You diligently study transformation magic at midnight, tired but making progress"
 ks_cultivation.1220.b: "Can’t it be during the day?"
 ks_cultivation.1220.b.tt: "You try to persuade the teacher to instruct you now"
 ks_cultivation.1220.b.success: "You succeeded"
 ks_cultivation.1220.b.success.tt: "The teacher taught you the secrets of transformation"
 ks_cultivation.1220.b.failure: "The teacher refuses"
 ks_cultivation.1220.b.failure.tt: "[teacher.GetHerHis] thinks you are disrespectful"
 ks_cultivation.1220.c: "Never mind"
 ks_cultivation.1220.c.tt: "You complete normal cultivation"

 ks_cultivation.1230.t: "Mystery of Zhenlong"
 ks_cultivation.1230.desc: "You see your teacher playing chess alone. Are they waiting for an opponent?\nAfter asking, [teacher.GetHerHis] explains: 'This is called a Zhenlong chess game, a carefully designed endgame. I’ve studied it for ten years but haven’t solved it. Perhaps you can try and get inspiration?'\n'Life is like a chess game,' [teacher.GetHerHis] sighs."
 ks_cultivation.1230.a: "I think I’ve seen a similar setup"
 ks_cultivation.1230.a.tt: "You try to solve it with your knowledge"
 ks_cultivation.1230.a.good: "Not very effective, but you exchanged ideas with your teacher"
 ks_cultivation.1230.a.better: "Some progress, but still unsuccessful"
 ks_cultivation.1230.b: "Maybe it can be solved this way"
 ks_cultivation.1230.b.tt: "You attempt to solve it using strategy"
 ks_cultivation.1230.b.good: "Not very effective, but you exchanged ideas with your teacher"
 ks_cultivation.1230.b.better: "Some progress, but still unsuccessful"
 ks_cultivation.1230.c: "Place a piece randomly"
 ks_cultivation.1230.c.tt: "You don’t know how to play chess"
 ks_cultivation.1230.c.better: "Seems okay, but still unsuccessful"
 ks_cultivation.1230.c.good: "Not logically placed"
 ks_cultivation.1230.c.common: "You placed it randomly"
 ks_cultivation.1230.c.wonderful: "You placed it in a ridiculous spot, lost a piece, but opened up the board and solved the puzzle"
 ks_cultivation.1230.d: "Never mind, I can’t do it"
 ks_cultivation.1230.d.tt: "You politely decline"

 ks_cultivation.1240.t: "Ancient Book Study"
 ks_cultivation.1240.desc: "Your teacher [teacher.GetFirstNameNoTooltip] gives you a book, saying it will greatly help your training. You open it to find pages filled with dense symbols – are these... oracle bone script?!"
 ks_cultivation.1240.a: "Attempt to decipher"
 ks_cultivation.1240.a.tt: "It seems written by a fox spirit named Daji"
 ks_cultivation.1240.a.success: "You succeed"
 ks_cultivation.1240.a.success.tt: "You gain knowledge and become a scholarly master"
 ks_cultivation.1240.a.failure: "You fail"
 ks_cultivation.1240.a.failure.tt: "Feeling somewhat frustrated"
 ks_cultivation.1240.b: "Better read something modern"
 ks_cultivation.1240.b.tt: "The book is too difficult"
 ks_cultivation.1240.b.good: "You found a suitable book and advanced your training"
 ks_cultivation.1240.b.worse: "You found an erotic book"
 ks_cultivation.1240.c: "Hmm"
 ks_cultivation.1240.c.tt: "You toss the book aside"
