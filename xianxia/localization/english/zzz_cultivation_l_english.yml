 #######################
 ## CULTIVATION PATH TENETS
 #######################

 # Orthodox Cultivation
 tenet_orthodox_cultivation:0 "Orthodox Cultivation"
 tenet_orthodox_cultivation_desc:0 "This sect walks the righteous path: strict rules, clear karmic conduct, master-disciple orthodoxy, and open-faced conflict. Their disciples prize honor, restraint, and legitimacy in the Jianghu."
 tenet_orthodox_cultivation_name:0 "Orthodox Path"

 # Unorthodox Cultivation
 tenet_unorthodox_cultivation:0 "Unorthodox Cultivation"
 tenet_unorthodox_cultivation_desc:0 "This sect pursues irregular inheritances and unconventional methods that orthodox elders condemn. They are not inherently demonic, but they value results, innovation, and opportunistic breakthroughs."
 tenet_unorthodox_cultivation_name:0 "Unorthodox Path"

 # Demonic Cultivation
 tenet_demonic_cultivation:0 "Demonic Cultivation"
 tenet_demonic_cultivation_desc:0 "This sect embraces forbidden arts of devouring, sacrifice, and baleful refinement. Power is seized, not granted; fear is a resource; and each breakthrough risks deeper karmic corruption."
 tenet_demonic_cultivation_name:0 "Demonic Path"

 # Vagrant Cultivation
 tenet_vagrant_cultivation:0 "Vagrant Cultivation"
 tenet_vagrant_cultivation_desc:0 "This sect follows the wandering path, blending fragments of many inheritances without binding itself to a single orthodoxy. Its cultivators survive by adaptability, dueling skill, and hard-won field experience."
 tenet_vagrant_cultivation_name:0 "Vagrant Path"

